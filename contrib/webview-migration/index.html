<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DawLite</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  body {
    background:#0a0a0e;
    color:#e0e0e4;
    display:grid;
    grid-template-rows:38px 1fr 1fr;
    grid-template-columns:1fr;
    gap:0;
  }
  /* Scrollbar styling */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:#0d0d12; }
  ::-webkit-scrollbar-thumb { background:#2a2a35; border-radius:3px; }

  /* ── Transport ── */
  #transport {
    display:flex; align-items:center; gap:10px;
    padding:0 12px;
    background:#0d0d12;
    border-bottom:1px solid #1a1a22;
    flex-shrink:0;
  }
  #transport .btn {
    background:#14141c;
    border:1px solid #22222c;
    color:#ccc;
    border-radius:5px;
    padding:4px 14px;
    font-size:13px;
    cursor:pointer;
    transition:all 0.15s;
  }
  #transport .btn:hover { background:#1a1d2a; border-color:#2a3a60; }
  #transport .btn:active { background:#1e2640; }
  #transport .btn.play-active { background:#1a2d4a; border-color:#3a6090; color:#6aa8ff; }
  #transport .btn.stop { background:#1a1212; border-color:#302020; }
  #transport .btn.stop:hover { background:#251515; border-color:#402525; }
  #time { font-size:15px; color:#888; min-width:90px; margin-left:auto; }
  #status { font-size:11px; color:#3a4a6a; font-weight:600; letter-spacing:2px; min-width:50px; }
  #status.playing { color:#6090cc; }

  /* ── Timeline ── */
  #timeline-wrap {
    background:#0a0a10;
    border-bottom:1px solid #16161f;
    display:flex; flex-direction:column;
    overflow-x:auto; overflow-y:hidden;
  }
  #ruler {
    height:24px; background:#0d0d14;
    border-bottom:1px solid #1a1a24;
    position:relative; min-width:800px;
  }
  #ruler canvas { display:block; }
  #track-list {
    flex:1;
    overflow-y:auto; overflow-x:hidden;
    min-width:800px;
  }
  .track-row {
    display:flex; align-items:stretch;
    height:42px;
    border-bottom:1px solid #111118;
    background:#0a0a10;
  }
  .track-row.selected { background:#10101c; }
  .track-header {
    min-width:110px; max-width:110px;
    background:#0c0c14;
    border-right:1px solid #1a1a24;
    display:flex; flex-direction:column; padding:2px 6px;
    font-size:11px; color:#666;
  }
  .track-header .name { color:#aab; font-size:12px; margin-bottom:1px; white-space:nowrap; overflow:hidden; }
  .track-header .btns { display:flex; gap:3px; }
  .track-header .b { font-size:10px; padding:0 5px; border-radius:3px; border:1px solid #222; background:#14141c; color:#888; cursor:pointer; }
  .track-header .b.active-m { color:#f55; border-color:#522; background:#1a1010; }
  .track-header .b.active-s { color:#fa4; border-color:#542; background:#1a1810; }
  .track-header .b.active-a { color:#f55; border-color:#522; background:#1a1010; }
  .track-clip-area {
    flex:1; position:relative; overflow:hidden;
  }
  .waveform-canvas {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none;
  }
  .drop-hint {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#333; font-size:11px; pointer-events:none;
  }

  /* ── Bottom panels ── */
  #bottom {
    display:grid;
    grid-template-columns:140px 1fr 320px;
    background:#0b0b12;
    flex:1; overflow:hidden;
  }
  #browser, #fx, #mixer {
    border-right:1px solid #16161f;
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  #mixer { border-right:none; }
  .panel-title {
    font-size:11px; color:#4a5a7a; padding:6px 8px;
    background:#0d0d14; border-bottom:1px solid #14141e;
    font-weight:600; letter-spacing:1px; flex-shrink:0;
  }

  /* Browser */
  #file-list { flex:1; overflow-y:auto; padding:4px; font-size:11px; }
  #file-list .item { padding:3px 6px; cursor:pointer; border-radius:3px; color:#888; }
  #file-list .item:hover { background:#141420; color:#bbc; }
  #file-list .item.dir { color:#558; }
  #file-list .item.dir:hover { color:#88a; }

  /* FX Chain */
  #fx .fx-row { padding:4px 8px; display:flex; align-items:center; gap:6px; font-size:11px; }
  #fx .fx-row label { color:#666; min-width:28px; }
  #fx .fx-row input[type=range] { flex:1; max-width:120px; height:4px; accent-color:#3a6090; }
  #fx .fx-row .val { color:#888; width:40px; text-align:right; }
  #plugin-list { flex:1; overflow-y:auto; padding:4px; font-size:10px; }
  #plugin-list .pl { display:flex; align-items:center; gap:4px; padding:2px 4px; }
  #plugin-list .pl span { color:#888; }
  #plugin-list .pl .rm { color:#633; cursor:pointer; font-size:12px; }
  #plugin-list .pl .rm:hover { color:#c44; }

  /* Mixer */
  #mixer-scroll { flex:1; overflow-x:auto; overflow-y:hidden; }
  #mixer-channels { display:flex; height:100%; min-height:180px; }
  .ch {
    min-width:68px; max-width:68px;
    background:#0a0a12;
    border-right:1px solid #16161f;
    display:flex; flex-direction:column; align-items:center;
    padding:4px 2px;
    flex-shrink:0;
  }
  .ch .ch-name { font-size:10px; color:#556; margin-bottom:2px; white-space:nowrap; overflow:hidden; max-width:64px; }
  .ch .strip { display:flex; flex:1; gap:3px; width:100%; }
  .ch .meter-col {
    width:10px; min-height:60px;
    background:#101018;
    border-radius:2px;
    position:relative;
    overflow:hidden;
  }
  .ch .meter-fill {
    position:absolute; bottom:0; left:0; width:100%;
    border-radius:2px;
    transition:height 0.05s ease-out;
    background:linear-gradient(to top,#40c040,#f0c030,#f04040);
  }
  .ch .fader-wrap {
    flex:1; display:flex; align-items:center; justify-content:center;
  }
  .ch .fader-wrap input[type=range] {
    writing-mode:bt-lr;
    -webkit-appearance:slider-vertical;
    width:16px; height:100%;
    accent-color:#4a7abb;
    background:#11111a;
    border-radius:4px;
  }
  .ch .db { font-size:9px; color:#444; margin:2px 0; }
  .ch .ch-btns { display:flex; gap:2px; margin-top:2px; }
  .ch .ch-btns button {
    font-size:9px; width:20px; padding:1px 0; border-radius:3px;
    border:1px solid #222; background:#12121a; color:#777;
    cursor:pointer; transition:all 0.1s;
  }
  .ch .ch-btns button.active-m { color:#f55; border-color:#522; background:#1a1010; }
  .ch .ch-btns button.active-s { color:#fa4; border-color:#542; background:#1a1810; }
  .ch .ch-btns button.active-a { color:#f55; border-color:#522; background:#1a1010; }

  /* Popup overlay */
  #popup-bg { display:none; position:fixed; top:0;left:0;width:100%;height:100%; background:rgba(0,0,0,0.5); z-index:100; }
  #popup { position:fixed; top:50%;left:50%; transform:translate(-50%,-50%); background:#12121c; border:1px solid #1e1e2c; border-radius:8px; padding:16px; min-width:300px; max-height:400px; overflow-y:auto; z-index:101; box-shadow:0 4px 24px rgba(0,0,0,0.6); }
  #popup .pop-title { font-size:12px; color:#5a6a8a; margin-bottom:8px; }
  #popup .pop-item { font-size:11px; padding:4px 8px; cursor:pointer; border-radius:4px; color:#99a; }
  #popup .pop-item:hover { background:#1a1a2a; color:#bbc; }
</style>
</head>
<body>

<!-- TRANSPORT -->
<div id="transport">
  <button class="btn play-btn" onclick="togglePlay()">&#9654;</button>
  <button class="btn stop" onclick="nativeStop('')">&#9632;</button>
  <span id="time">00:00.000</span>
  <span id="status">STOP</span>
  <button class="btn" onclick="nativeAddTrack('')" style="margin-left:auto">+T</button>
  <button class="btn" onclick="removeLastTrack()">-T</button>
</div>

<!-- TIMELINE -->
<div id="timeline-wrap">
  <div id="ruler"><canvas id="ruler-canvas"></canvas></div>
  <div id="track-list"></div>
</div>

<!-- BOTTOM -->
<div id="bottom">
  <!-- Browser -->
  <div id="browser">
    <div class="panel-title">BROWSER</div>
    <div id="file-list"></div>
  </div>

  <!-- FX Chain -->
  <div id="fx">
    <div class="panel-title">FX CHAIN</div>
    <div class="fx-row">
      <label>Vol</label>
      <input type="range" id="fx-vol" min="0" max="1.5" step="0.01" value="1" oninput="onFxVol(this.value)">
      <span class="val" id="fx-vol-val">1.00</span>
    </div>
    <div class="fx-row">
      <label>Pan</label>
      <input type="range" id="fx-pan" min="-1" max="1" step="0.01" value="0" oninput="onFxPan(this.value)">
      <span class="val" id="fx-pan-val">C</span>
    </div>
    <div class="fx-row" style="gap:8px">
      <label style="cursor:pointer" onclick="toggleFxM()">M</label>
      <label style="cursor:pointer" onclick="toggleFxS()">S</label>
      <label style="cursor:pointer" onclick="toggleFxR()">R</label>
      <span style="flex:1"></span>
      <button class="btn" style="font-size:10px;padding:2px 8px" onclick="openPluginPopup()">+ Plugin</button>
    </div>
    <div id="plugin-list"></div>
  </div>

  <!-- Mixer -->
  <div id="mixer">
    <div class="panel-title">MIXER</div>
    <div id="mixer-scroll">
      <div id="mixer-channels"></div>
    </div>
    <div id="mixer-toolbar" style="font-size:9px;color:#444;padding:3px 8px;border-top:1px solid #14141e">1 track</div>
  </div>
</div>

<!-- Popup -->
<div id="popup-bg" onclick="closePopup()"></div>
<div id="popup"></div>

<script>
// ─── STATE ───
let state = {
  playing:false, playhead:0, trackCount:1,
  trackPeaks:[], volumes:[], mutes:[], solos:[], arms:[], trackNames:[],
  selectedTrack:0, currentPath:''
};

// ─── NATIVE BRIDGE HELPERS ───
function callNative(name, ...args) {
  if (window[name]) return window[name](args.join(','));
  console.warn('Native function not bound:', name);
  return '';
}

// ─── INIT ───
function init() {
  renderTrackList();
  renderMixerChannels();
  drawRuler();
}
setTimeout(init, 100);

// ─── CALLBACK FROM C++ ───
function updateUIFromNative(data) {
  state.playing = data.playing;
  state.playhead = data.playhead;
  state.trackCount = data.trackCount;
  state.trackPeaks = data.trackPeaks || [];
  state.volumes = data.volumes || [];
  state.mutes = data.mutes || [];
  state.solos = data.solos || [];
  state.arms = data.arms || [];
  state.trackNames = data.trackNames || [];

  // Transport
  updateTransport();

  // Mixer peaks + faders
  updateMixerChannels();

  // Timeline playhead
  drawPlayheadCursor();

  // FX panel values for selected track
  updateFxPanel();

  // Ruler/time
  updateTime();
}

function updateTransport() {
  let btn = document.querySelector('.play-btn');
  let st = document.getElementById('status');
  if (state.playing) {
    btn.innerHTML = '&#9646;&#9646;';
    btn.classList.add('play-active');
    st.textContent = 'PLAY';
    st.classList.add('playing');
  } else {
    btn.innerHTML = '&#9654;';
    btn.classList.remove('play-active');
    st.textContent = 'STOP';
    st.classList.remove('playing');
  }
}

function updateTime() {
  let secs = state.playhead / 48000;
  let m = Math.floor(secs/60), s = Math.floor(secs%60);
  let ms = Math.floor((secs - Math.floor(secs))*1000);
  document.getElementById('time').textContent =
    String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(ms).padStart(3,'0');
}

function updateFxPanel() {
  let t = state.selectedTrack;
  if (t >= state.trackCount) t = 0;
  document.getElementById('fx-vol').value = state.volumes[t] || 1;
  document.getElementById('fx-vol-val').textContent = (state.volumes[t]||1).toFixed(2);
  let pv = document.getElementById('fx-pan');
  pv.value = 0;
  document.getElementById('fx-pan-val').textContent = 'C';
}

// ─── RENDER TRACK LIST ───
function renderTrackList() {
  let list = document.getElementById('track-list');
  list.innerHTML = '';
  for (let i = 0; i < state.trackCount; ++i) {
    let name = state.trackNames[i] || ('Track '+(i+1));
    let sel = (i === state.selectedTrack) ? ' selected' : '';
    let div = document.createElement('div');
    div.className = 'track-row' + sel;
    div.id = 'track-'+i;
    div.innerHTML =
      '<div class="track-header">'+
        '<span class="name">'+name.substring(0,14)+'</span>'+
        '<div class="btns">'+
          '<button class="b'+(state.mutes[i]?' active-m':'')+'" id="tm-'+i+'" onclick="toggleMute('+i+')">M</button>'+
          '<button class="b'+(state.solos[i]?' active-s':'')+'" id="ts-'+i+'" onclick="toggleSolo('+i+')">S</button>'+
          '<button class="b'+(state.arms[i]?' active-a':'')+'" id="ta-'+i+'" onclick="toggleArm('+i+')">A</button>'+
        '</div>'+
      '</div>'+
      '<div class="track-clip-area" id="clip-area-'+i+'" onclick="selectTrack('+i+')">'+
        '<span class="drop-hint">Drop WAV/MP3 here</span>'+
        '<canvas class="waveform-canvas" id="wf-'+i+'"></canvas>'+
      '</div>';
    list.appendChild(div);
  }
  updateTrackButtonStates();
}

function updateTrackButtonStates() {
  for (let i = 0; i < state.trackCount; ++i) {
    let mb = document.getElementById('tm-'+i);
    let sb = document.getElementById('ts-'+i);
    let ab = document.getElementById('ta-'+i);
    if (mb) { mb.className = 'b'+(state.mutes[i]?' active-m':''); }
    if (sb) { sb.className = 'b'+(state.solos[i]?' active-s':''); }
    if (ab) { ab.className = 'b'+(state.arms[i]?' active-a':''); }
  }
  // Selection highlight
  let rows = document.querySelectorAll('.track-row');
  rows.forEach((r,i) => {
    r.classList.toggle('selected', i === state.selectedTrack);
  });
}

// ─── RENDER MIXER CHANNELS ───
function renderMixerChannels() {
  let cont = document.getElementById('mixer-channels');
  cont.innerHTML = '';
  for (let i = 0; i < state.trackCount; ++i) {
    let name = state.trackNames[i] || ('Ch'+(i+1));
    let div = document.createElement('div');
    div.className = 'ch';
    div.id = 'ch-'+i;
    div.innerHTML =
      '<span class="ch-name">'+name.substring(0,8)+'</span>'+
      '<div class="strip">'+
        '<div class="meter-col"><div class="meter-fill" id="meter-'+i+'" style="height:0%"></div></div>'+
        '<div class="fader-wrap">'+
          '<input type="range" id="fader-'+i+'" min="0" max="1.5" step="0.01" value="'+(state.volumes[i]||1)+'" '+
          'oninput="onMixerFader('+i+',this.value)" ondblclick="this.value=1;onMixerFader('+i+',1)">'+
        '</div>'+
      '</div>'+
      '<span class="db" id="db-'+i+'">0.0 dB</span>'+
      '<div class="ch-btns">'+
        '<button id="cm-'+i+'" class="'+(state.mutes[i]?'active-m':'')+'" onclick="toggleMute('+i+')">M</button>'+
        '<button id="cs-'+i+'" class="'+(state.solos[i]?'active-s':'')+'" onclick="toggleSolo('+i+')">S</button>'+
        '<button id="ca-'+i+'" class="'+(state.arms[i]?'active-a':'')+'" onclick="toggleArm('+i+')">A</button>'+
      '</div>';
    cont.appendChild(div);
  }
  updateMixerChannels();
}

function updateMixerChannels() {
  for (let i = 0; i < state.trackCount; ++i) {
    let mf = document.getElementById('meter-'+i);
    if (mf) {
      let pct = Math.min((state.trackPeaks[i]||0) / 1.5 * 100, 100);
      mf.style.height = pct.toFixed(1) + '%';
    }
    let dbE = document.getElementById('db-'+i);
    if (dbE) {
      let v = state.volumes[i] || 1;
      let db = v > 0.0001 ? (20*Math.log10(v)) : -Infinity;
      dbE.textContent = !isFinite(db) ? '-inf dB' : (db>=0?'+':'')+db.toFixed(1)+' dB';
    }
    // Sync fader value from state (but don't fight user dragging)
    let fd = document.getElementById('fader-'+i);
    if (fd && document.activeElement !== fd) {
      fd.value = state.volumes[i] || 1;
    }
    // M/S/A buttons
    let cm = document.getElementById('cm-'+i);
    let cs = document.getElementById('cs-'+i);
    let ca = document.getElementById('ca-'+i);
    if (cm) cm.className = state.mutes[i] ? 'active-m' : '';
    if (cs) cs.className = state.solos[i] ? 'active-s' : '';
    if (ca) ca.className = state.arms[i] ? 'active-a' : '';
  }
  document.getElementById('mixer-toolbar').textContent = state.trackCount + ' track'+(state.trackCount>1?'s':'');
}

// ─── RULER ───
function drawRuler() {
  let c = document.getElementById('ruler-canvas');
  let parent = document.getElementById('ruler');
  c.width = parent.clientWidth;
  c.height = 24;
  let ctx = c.getContext('2d');
  ctx.fillStyle = '#0d0d14';
  ctx.fillRect(0,0,c.width,c.height);
  ctx.strokeStyle = '#2a2a35';
  ctx.beginPath(); ctx.moveTo(0,23.5); ctx.lineTo(c.width,23.5); ctx.stroke();
  for (let s = 0; s <= c.width/80 + 2; ++s) {
    let x = 110 + s*80;
    ctx.strokeStyle = '#3a3a45';
    ctx.beginPath(); ctx.moveTo(x,14); ctx.lineTo(x,24); ctx.stroke();
    ctx.fillStyle = '#777788';
    ctx.font = '10px monospace';
    ctx.fillText(s+'s', x+3, 12);
  }
}

function drawPlayheadCursor() {
  // Simple approach: add a thin vertical line on the ruler canvas
  drawRuler(); // redraw ruler backgrounds
  let c = document.getElementById('ruler-canvas');
  let ctx = c.getContext('2d');
  let px = 110 + (state.playhead/48000)*80;
  ctx.strokeStyle = '#e0b030';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,24); ctx.stroke();
  // Triangle
  ctx.fillStyle = '#e0b030';
  ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px-5,10); ctx.lineTo(px+5,10); ctx.fill();
}

// ─── ACTIONS ───
function togglePlay() {
  if (state.playing) callNative('nativePause');
  else callNative('nativePlay');
}

function toggleMute(i) {
  callNative('nativeSetMute', i, state.mutes[i] ? '0' : '1');
  state.mutes[i] = !state.mutes[i];
  updateTrackButtonStates();
  updateMixerChannels();
}
function toggleSolo(i) {
  callNative('nativeSetSolo', i, state.solos[i] ? '0' : '1');
  state.solos[i] = !state.solos[i];
  updateTrackButtonStates();
  updateMixerChannels();
}
function toggleArm(i) {
  callNative('nativeSetArm', i, state.arms[i] ? '0' : '1');
  state.arms[i] = !state.arms[i];
  updateTrackButtonStates();
  updateMixerChannels();
}

function selectTrack(i) {
  state.selectedTrack = i;
  updateTrackButtonStates();
  updateFxPanel();
}

function removeLastTrack() {
  let idx = state.trackCount - 1;
  if (idx < 1) return;
  callNative('nativeRemoveTrack', idx);
  state.trackCount--;
  if (state.selectedTrack >= state.trackCount) state.selectedTrack = state.trackCount - 1;
  renderTrackList();
  renderMixerChannels();
  drawRuler();
}

function onMixerFader(i, val) {
  callNative('nativeSetVolume', i, val);
  state.volumes[i] = parseFloat(val);
  updateMixerChannels();
}

function onFxVol(val) {
  callNative('nativeSetVolume', state.selectedTrack, val);
  state.volumes[state.selectedTrack] = parseFloat(val);
  document.getElementById('fx-vol-val').textContent = parseFloat(val).toFixed(2);
}

function onFxPan(val) {
  let v = parseFloat(val);
  document.getElementById('fx-pan-val').textContent = v<0?'L'+Math.abs(v).toFixed(1):v>0?'R'+v.toFixed(1):'C';
}

function toggleFxM() { toggleMute(state.selectedTrack); }
function toggleFxS() { toggleSolo(state.selectedTrack); }
function toggleFxR() { toggleArm(state.selectedTrack); }

function openPluginPopup() {
  document.getElementById('popup-bg').style.display = 'block';
  document.getElementById('popup').innerHTML =
    '<div class="pop-title">CLAP Plugins</div>'+
    '<div style="color:#555;font-size:10px">No plugins found.<br>Place .clap files in ./plugins/</div>';
}
function closePopup() {
  document.getElementById('popup-bg').style.display = 'none';
}
</script>
</body>
</html>
