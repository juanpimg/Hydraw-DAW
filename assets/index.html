var _lastPluginSel = -2;
function renderPluginList(force) {
  var track = STATE.sel === -1 ? -1 : STATE.sel;
  if (!force && _lastPluginSel === track) return;
  _lastPluginSel = track;
  var p = cn('nativePluginList', String(track));
  if (p && typeof p.then === 'function') {
    p.then(function(plugins) {
      var list = document.getElementById('plugin-list');
      if (!list) return;
      var html = '';
      if (plugins && Array.isArray(plugins)) {
        var last = plugins.length - 1;
        for (var i = 0; i < plugins.length; i++) {
          var p = plugins[i];
          var upDis   = i === 0     ? ' dis' : '';
          var downDis = i === last  ? ' dis' : '';
          html += '<div class="pl" draggable="true" data-idx="' + i + '">' +
            '<span class="pos">' + (i + 1) + '</span>' +
            '<span class="pm">' +
              '<span class="pup' + upDis + '" onclick="movePlugin(\'' + track + '\',' + i + ',' + (i - 1) + ')" title="Move up">&#9650;</span>' +
              '<span class="pdn' + downDis + '" onclick="movePlugin(\'' + track + '\',' + i + ',' + (i + 1) + ')" title="Move down">&#9660;</span>' +
            '</span>' +
            '<span class="pb' + (p.bypassed ? ' bypassed' : '') + '" onclick="mutatePlugin(\'nativePluginBypass\',\'' + track + ',' + i + ',' + (p.bypassed ? '0' : '1') + '\')" title="Toggle">&#9679;</span>' +
            '<span class="pn" onclick="cn(\'nativePluginShowGUI\',\'' + track + ',' + i + '\')" title="Toggle GUI">' + escHtml(p.name) + '</span>' +
            '<span class="px" onclick="mutatePlugin(\'nativePluginRemove\',\'' + track + ',' + i + '\')" title="Remove">&times;</span>' +
            '</div>';
        }
      }
      html += '<div class="pl-add" onclick="_pluginTarget=' + track + ';scanPlugins()">+ Add Plugin</div>';
      list.innerHTML = html;
    });
  }
}

function renderPluginListDiv(q) {
  var list = document.getElementById('popup-list');
  if (!list) return;
  if (STATE.pluginsCache.length === 0) {
    list.innerHTML = '<div class="pnone">None found</div>';
    return;
  }
  var html = '';
  var count = 0;
  for (var i = 0; i < STATE.pluginsCache.length; i++) {
    var pl = STATE.pluginsCache[i];
    var name = typeof pl === 'string' ? pl.split('/').pop().replace('.clap','') : (pl.name || pl.id || 'Unknown');
    if (q && name.toLowerCase().indexOf(q) === -1) continue;
    html += '<div class="pitem" onclick="loadPlugin(' + i + ')">' + escHtml(name) + '</div>';
    count++;
  }
  if (count === 0) html += '<div class="pnone">No plugins match "' + escHtml(q) + '"</div>';
  list.innerHTML = html;
}

function filterPlugins() {
  var inp = document.getElementById('popup-search');
  renderPluginListDiv(inp ? inp.value : '');
}

function scanPlugins() {
  var target = _pluginTarget >= -1 ? _pluginTarget : STATE.sel;
  _pluginTarget = target;
  var p = cn('nativeScanClap', STATE.browserPath || '/usr/lib/clap');
  if (p && typeof p.then === 'function') {
    p.then(function(data) {
      STATE.pluginsCache = [];
      if (data && Array.isArray(data)) STATE.pluginsCache = data;
      var title = target === -1 ? 'Master Plugins' : 'Track ' + (target + 1) + ' Plugins';
      showPopup('<div style="font-size:12px;color:#CBD5E1;margin-bottom:6px;font-weight:600">' + title + '</div>'
        + '<input id="popup-search" type="text" placeholder="Search plugins..." oninput="filterPlugins()" autofocus>'
        + '<div id="popup-list"></div>');
      filterPlugins();
    });
  } else {
    showPopup('<div style="font-size:12px;color:#CBD5E1;margin-bottom:8px;font-weight:600">CLAP Plugins</div><div style="color:#64748B;font-size:10px">Bridge not ready</div>');
  }
}

function loadPlugin(i) {
  var pl = STATE.pluginsCache[i];
  if (!pl) return;
  var target = _pluginTarget >= -1 ? _pluginTarget : STATE.sel;
  var args;
  if (typeof pl === 'string') {
    args = target + ',' + pl + ',' + pl.split('/').pop().replace('.clap','');
  } else {
    args = target + ',' + pl.path + ',' + (pl.id || pl.name);
  }
  log('INFO', 'PLUGIN', 'Loading plugin -> ' + (target === -1 ? 'master' : 'track ' + target));
  closePopup();
  _pluginTarget = -2;
  // Await the load before re-rendering. addPlugin on the C++ side does
  // dlopen + init + activate which is slow; if we don't wait, the
  // subsequent nativePluginList call can hit C++ before the plugin is in
  // the chain and the new row never appears (user has to add twice).
  var p = cn('nativePluginLoad', args);
  if (p && typeof p.then === 'function') {
    p.then(function() { renderPluginList(true); });
  } else {
    renderPluginList(true);
  }
}

// Fire a mutation binding (remove/bypass) and re-render once C++ is done.
// Used for any operation that changes the plugin list / state and where
// the render must reflect the post-mutation snapshot.
function mutatePlugin(binding, args) {
  var p = cn(binding, args);
  if (p && typeof p.then === 'function') {
    p.then(function() { renderPluginList(true); });
  } else {
    renderPluginList(true);
  }
}

function movePlugin(track, from, to) {
  if (from === to) return;
  // Await the native call so the list refetch always sees the new order.
  // cn() returns a Promise; renderPluginList(true) is fired in the .then
  // so we never race the move message through the WebKitGTK bus.
  var p = cn('nativePluginMove', track + ',' + from + ',' + to);
  if (p && typeof p.then === 'function') {
    p.then(function() { renderPluginList(true); });
  } else {
    renderPluginList(true);
  }
}

// ── HTML5 drag-and-drop reorder for the FX chain ──
(function() {
  var dragSrcIdx = null;
  function findRow(el) {
    while (el && el !== document.body) {
      if (el.classList && el.classList.contains('pl')) return el;
      el = el.parentNode;
    }
    return null;
  }
  document.addEventListener('dragstart', function(e) {
    var row = findRow(e.target);
    if (!row) return;
    dragSrcIdx = parseInt(row.getAttribute('data-idx'), 10);
    if (e.dataTransfer) {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(dragSrcIdx));
    }
    row.style.opacity = '0.4';
  });
  document.addEventListener('dragend', function(e) {
    var row = findRow(e.target);
    if (row) row.style.opacity = '';
    dragSrcIdx = null;
  });
  document.addEventListener('dragover', function(e) {
    var row = findRow(e.target);
    if (!row || dragSrcIdx === null) return;
    e.preventDefault();
    if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
  });
  document.addEventListener('drop', function(e) {
    var row = findRow(e.target);
    if (!row || dragSrcIdx === null) return;
    e.preventDefault();
    var dstIdx = parseInt(row.getAttribute('data-idx'), 10);
    var track = STATE.sel === -1 ? -1 : STATE.sel;
    if (dstIdx === dragSrcIdx) return;
    movePlugin(track, dragSrcIdx, dstIdx);
  });
})();

// ── SOFT CLIPPER GUI (builtin plugin popup) ──
var _scGuiTrack = -1, _scGuiPlugin = -1, _scWasOpen = false;
function showSoftClipperGUI(trackIdx, pluginIdx, drive) {
  _scGuiTrack = trackIdx;
  _scGuiPlugin = pluginIdx;
  showPopup(
    '<div style="font-size:12px;color:#CBD5E1;margin-bottom:8px;font-weight:600">Soft Clipper</div>' +
    '<div style="display:flex;flex-direction:column;gap:8px;min-width:240px">' +
      '<div style="display:flex;align-items:center;gap:8px">' +
        '<span style="font-size:10px;color:#8888b0;width:30px">Drive</span>' +
        '<input type="range" id="sc-drive" min="0.1" max="3" step="0.01" value="' + drive + '" ' +
        'oninput="onScDrive(this.value)" style="flex:1">' +
        '<span id="sc-drive-v" style="font-size:11px;color:#e4e4e8;min-width:32px;text-align:right">' + parseFloat(drive).toFixed(2) + '</span>' +
      '</div>' +
    '</div>' +
    '<div style="margin-top:10px;text-align:center">' +
      '<button onclick="closePopup();cn(\'nativePluginShowGUI\',\'' + trackIdx + ',' + pluginIdx + '\')" ' +
      'style="background:var(--bd3);color:#CBD5E1;border:1px solid var(--bd-hover);border-radius:4px;padding:4px 14px;cursor:pointer;font-size:11px">Close</button>' +
    '</div>'
  );
  _scWasOpen = true;
}
function closeSoftClipperGUI() {
  closePopup();
  _scWasOpen = false;
}
function onScDrive(v) {
  var sv = document.getElementById('sc-drive-v');
  if (sv) sv.textContent = parseFloat(v).toFixed(2);
  cn('nativeSetSoftClipperDrive', _scGuiTrack + ',' + _scGuiPlugin + ',' + v);
}

function showPopup(html) {
  document.getElementById('popup').innerHTML = html;
  document.getElementById('popup-bg').style.display = 'block';
  document.getElementById('popup').style.display = 'block';
}

function closePopup() {
  document.getElementById('popup-bg').style.display = 'none';
  document.getElementById('popup').style.display = 'none';
}

// ── DRAG & DROP ──
var _dragTrackId = -1;
var _dropTargetTrackId = -1; // stored by JS drop, consumed by C++ handler

// Global dragover — enables drops anywhere in the window
document.addEventListener('dragover', function(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });

// Per-track drop via delegation on #track-list
// JS captures the target track ID; C++ interceptor extracts the file path
var tl = document.getElementById('track-list');
if (tl) {
  tl.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    var track = e.target.closest('.track');
    if (track) {
      var id = parseInt(track.getAttribute('data-track-id'));
      if (!isNaN(id) && id !== _dragTrackId) {
        clearDragOver();
        _dragTrackId = id;
        track.classList.add('drag-over');
      }
    }
  });

  tl.addEventListener('dragleave', function(e) {
    var track = e.target.closest('.track');
    if (track && track.getAttribute('data-track-id') == _dragTrackId) {
      clearDragOver();
    }
  });

  tl.addEventListener('drop', function(e) {
    // IMPORTANT: no e.preventDefault() — let WebKit create a navigation action
    // so the C++ decide-policy interceptor can extract the file path
    clearDragOver();
    _dropTargetTrackId = -1;
    var track = e.target.closest('.track');
    if (!track) {
      if (_pendingDropPath) {
        var pp = _pendingDropPath;
        _pendingDropPath = null;
        markDropProcessed(pp);
        handleEmptyDrop(pp);
      }
      return;
    }
    // Check if dropped on the "Add Track" row
    if (track.classList.contains('add-track')) {
      if (_pendingDropPath) {
        var pp = _pendingDropPath;
        _pendingDropPath = null;
        markDropProcessed(pp);
        var p = cn('nativeAddTrack');
        if (p && typeof p.then === 'function') {
          p.then(function(n) {
            if (typeof n === 'number' && n >= 0) {
              STATE.trackCount++;
              doDropLoad(n, pp);
            } else {
              showError('Could not add track');
            }
          });
        }
      }
      return;
    }
    var trackId = parseInt(track.getAttribute('data-track-id'));
    if (isNaN(trackId)) return;
    _dropTargetTrackId = trackId;
    log('INFO', 'DND', 'JS drop on track ' + trackId);
    if (_pendingDropPath) {
      var pp = _pendingDropPath;
      _pendingDropPath = null;
      markDropProcessed(pp);
      doDropLoad(trackId, pp);
    }
  });
}

// Fallback for drops outside #track-list (ruler, bottom panel, etc.)
document.addEventListener('drop', function(e) {
  if (e.target.closest('#track-list')) return;
  if (_pendingDropPath) {
    var pp = _pendingDropPath;
    _pendingDropPath = null;
    markDropProcessed(pp);
    handleEmptyDrop(pp);
  }
});

function doDropLoad(trackId, filePath) {
  var ext = filePath.split('.').pop().toLowerCase();
  if (ext !== 'wav' && ext !== 'mp3' && ext !== 'flac' && ext !== 'ogg' && ext !== 'aac' && ext !== 'm4a' && ext !== 'wma' && ext !== 'opus' && ext !== 'aiff' && ext !== 'aif') {
    log('WARN', 'DND', 'Unsupported format on track ' + trackId + ': ' + filePath);
    showError('Unsupported audio format: ' + filePath.split('/').pop());
    return;
  }
  log('INFO', 'DND', 'Drop on track ' + trackId + ': ' + filePath);
  markDropProcessed(filePath);
  var p = cn('nativeLoadWav', trackId + ',' + filePath);
  if (p && typeof p.then === 'function') {
    p.then(function(ok) {
      if (ok === true) {
        log('INFO', 'DND', 'Loaded OK on track ' + trackId + ': ' + filePath);
        STATE.sel = trackId;
        var parts = filePath.split('/');
        _clipNames[trackId] = parts[parts.length - 1] || 'Audio';
        cn('nativeGetAudioInfo', String(trackId)).then(function(info) {
          if (info && info.hasAudio) {
            STATE.audioFrames[trackId] = info.frames;
            STATE.clipStarts[trackId] = info.clipStart;
          }
          cn('nativeGetPeakCache', String(trackId)).then(function(peaks) {
            STATE.peakCaches[trackId] = peaks || [];
            renderAll();
          });
        });
      } else {
        log('WARN', 'DND', 'Failed to load on track ' + trackId + ': ' + filePath);
        showError('Could not load ' + filePath.split('/').pop());
      }
    });
  }
}

function clearDragOver() {
  if (_dragTrackId >= 0) {
    var old = document.querySelector('.track[data-track-id="' + _dragTrackId + '"]');
    if (old) old.classList.remove('drag-over');
    _dragTrackId = -1;
  }
}

// Called from C++ when WebKit intercepts a native file drop (decide-policy signal)
// NOTE: C++ may call this twice (decide-policy + drag-data-received fallback).
// We only STORE the path here; the actual load happens in the JS drop event
// which fires after and knows the target track.
var _pendingDropPath = null;
var _recentDrops = {};
var _clipNames = []; // clip label names (persist across telemetry)

function markDropProcessed(path) {
  _recentDrops[path] = Date.now();
  var cutoff = Date.now() - 6000;
  for (var p in _recentDrops) {
    if (_recentDrops[p] < cutoff) delete _recentDrops[p];
  }
}

// Called from C++ when WebKit intercepts a native file drop
// (both decide-policy and drag-data-received may fire).
// Two-way handshake with JS drop event:
//   _dropTargetTrackId (JS sets, C++ reads) — JS fired first
//   _pendingDropPath   (C++ sets, JS reads) — C++ fired first
window._onNativeDropPath = function(path) {
  var last = _recentDrops[path];
  if (last && Date.now() - last < 5000) return;
  log('INFO', 'DND', 'Native drop path received: ' + path);

  // If JS drop already fired, consume its target track immediately
  if (_dropTargetTrackId >= 0 && _dropTargetTrackId < STATE.trackCount) {
    var tid = _dropTargetTrackId;
    _dropTargetTrackId = -1;
    markDropProcessed(path);
    doDropLoad(tid, path);
    return;
  }

  // JS hasn't fired yet — store path and wait for the drop event.
  // The 15s timeout is purely a cleanup (don't handle here —
  // only actual JS drop events consume the pending path).
  _pendingDropPath = path;
  setTimeout(function() {
    if (_pendingDropPath === path) {
      _pendingDropPath = null;
    }
  }, 15000);
};

function handleEmptyDrop(path) {
  var ext = path.split('.').pop().toLowerCase();
  if (ext !== 'wav' && ext !== 'mp3' && ext !== 'flac' && ext !== 'ogg' && ext !== 'aac' && ext !== 'm4a' && ext !== 'wma' && ext !== 'opus' && ext !== 'aiff' && ext !== 'aif') {
    log('WARN', 'DND', 'Unsupported format for empty drop: ' + path);
    showError('Unsupported audio format: ' + path.split('/').pop());
    return;
  }
  log('INFO', 'DND', 'Empty-area drop: ' + path);
  for (var i = 0; i < STATE.trackCount; i++) {
    if (!(STATE.audioFrames[i] > 0)) {
      doDropLoad(i, path);
      return;
    }
  }
  var p = cn('nativeAddTrack');
  if (p && typeof p.then === 'function') {
    p.then(function(n) {
      if (typeof n === 'number' && n >= 0) {
        STATE.trackCount++;
        doDropLoad(n, path);
      } else {
        showError('Could not add track');
      }
    });
  }
}

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', function(e) {
  if (e.keyCode === 32) { e.preventDefault(); togglePlay(); }
});

// ── RESIZABLE DIVIDER ──
(function() {
  var divider = document.getElementById('divider');
  var bottom = document.getElementById('bottom');
  var isDragging = false;
  if (!divider || !bottom) return;
  divider.addEventListener('mousedown', function(e) {
    isDragging = true;
    document.body.style.cursor = 'row-resize';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    var main = document.getElementById('main');
    var mainRect = main.getBoundingClientRect();
    var newHeight = mainRect.bottom - e.clientY - divider.offsetHeight;
    newHeight = Math.max(120, Math.min(newHeight, window.innerHeight * 0.7));
    bottom.style.height = newHeight + 'px';
  });
  document.addEventListener('mouseup', function() {
    if (isDragging) {
      isDragging = false;
      document.body.style.cursor = '';
    }
  });
})();

// ── CLIP DRAG ──
var clipDrag = null;
var _clipDragInitialized = false;

function initClipDrag() {
  if (_clipDragInitialized) return;
  var list = document.getElementById('track-list');
  if (!list) return;
  _clipDragInitialized = true;

  // Single delegated mousedown handler. Handles both track selection
  // and tool dispatch (split / fade / drag-to-move). We intentionally
  // use ONE handler because two separate listeners on the same
  // element compete: the first one's re-render side effects
  // (e.g. updateFxPanel) can detach the .clip-block target before
  // the second listener runs, breaking `e.target.closest(...)`.
  list.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    if (e.target.closest('.tb')) return;       // M/S/A buttons

    // ── Track selection (add-track row → add a new track) ──
    var track = e.target.closest('.track');
    if (!track) return;
    if (track.classList.contains('add-track')) { addTrack(); return; }
    var idx = parseInt(track.dataset.trackId);
    if (isNaN(idx)) return;

    // ── Tool dispatch on clip blocks ──
    // Cache the clip-block element BEFORE any DOM mutation. We
    // update STATE.sel and call updateFxPanel, but neither of those
    // destroys the clip-block, so `cb` stays valid for the tool
    // dispatch below. We capture trackIdx and rect here to avoid
    // any dependency on later DOM state.
    var cb = e.target.closest('.clip-block');
    var trackIdx, clipIdx, rect, edgeWidth, xWithin;
    if (cb) {
      trackIdx = parseInt(cb.dataset.track, 10);
      clipIdx = parseInt(cb.dataset.clip || '0', 10);
      rect = cb.getBoundingClientRect();
      edgeWidth = Math.max(8, Math.min(40, rect.width * 0.1));
      xWithin = e.clientX - rect.left;
    }

    // Track selection: light-touch update (no full re-render).
    if (STATE.sel !== idx) {
      var prev = document.querySelector('.track.sel');
      if (prev) prev.classList.remove('sel');
      STATE.sel = idx;
      track.classList.add('sel');
      updateFxPanel();
    }

    // If we didn't click on a clip block, this is just a track-select.
    if (!cb) return;

    // ── Tool dispatch ──
    log('INFO', 'TOOL', 'mousedown on clip track=' + trackIdx + ' clip=' + clipIdx + ' tool=' + _tool);

    if (_tool === 'split') {
      e.stopPropagation();
      e.preventDefault();
      // Look up the actual clip's start/frames from STATE.clipBlocks
      // so the split position is computed in the project timeline
      // (clipStart + local). We also validate the split is strictly
      // inside the clip, not at its edges.
      var trackClipsArr = (STATE.clipBlocks && STATE.clipBlocks[trackIdx]) || [];
      var clipInfo = trackClipsArr[clipIdx];
      if (!clipInfo) {
        log('WARN', 'TOOL', 'no clip info for track=' + trackIdx + ' clip=' + clipIdx);
        return;
      }
      var clipStartSamples = clipInfo[0] || 0;
      var clipFrames = clipInfo[1] || 0;
      var pxPerSec = 80;
      var localSamples = Math.round((xWithin / pxPerSec) * 48000);
      var splitPos = clipStartSamples + localSamples;
      if (splitPos <= clipStartSamples || splitPos >= clipStartSamples + clipFrames) {
        log('WARN', 'TOOL', 'split out of range (splitPos=' + splitPos +
             ' clipStart=' + clipStartSamples + ' clipEnd=' + (clipStartSamples + clipFrames) + ')');
        return;
      }
      log('INFO', 'TOOL', 'split track=' + trackIdx + ' clip=' + clipIdx + ' at sample=' + splitPos);
      cn('nativeSplitClip', trackIdx + ',' + clipIdx + ',' + splitPos);
      return;
    }

    if (_tool === 'fade') {
      // Check if the click landed directly on a fade overlay
      var fadeOverlay = e.target.closest('.fade-in, .fade-out');
      var onLeftEdge, onRightEdge;
      if (fadeOverlay) {
        onLeftEdge = fadeOverlay.classList.contains('fade-in');
        onRightEdge = fadeOverlay.classList.contains('fade-out');
      } else {
        onLeftEdge = xWithin <= edgeWidth;
        onRightEdge = (rect.right - e.clientX) <= edgeWidth;
      }
      if (!onLeftEdge && !onRightEdge) {
        log('WARN', 'TOOL', 'fade click not on fade area, ignoring');
        return;
      }
      var fTrackClipsArr = (STATE.clipBlocks && STATE.clipBlocks[trackIdx]) || [];
      var fClipInfo = fTrackClipsArr[clipIdx];
      e.stopPropagation();
      e.preventDefault();
      _fadeDrag = {
        trackIdx: trackIdx,
        clipIdx: clipIdx,
        edge: onLeftEdge ? 'in' : 'out',
        startX: e.clientX,
        samplesPerPx: 48000 / 80,
        cb: cb,
        origClipInfo: fClipInfo ? fClipInfo.slice() : null
      };
      document.body.style.cursor = 'ew-resize';
      document.body.style.userSelect = 'none';
      return;
    }

    // Default: pointer tool → drag to move.
    e.stopPropagation();
    e.preventDefault();

    // Freeze scrolling while we drag a clip — prevents the browser
    // auto‑scrolling the track list and wrecking the clip position.
    var tl = document.getElementById('track-list');
    var savedOverflowY = tl ? tl.style.overflowY : null;
    if (tl) tl.style.overflowY = 'hidden';

    clipDrag = {
      trackIdx: trackIdx,
      clipIdx: clipIdx,
      startX: e.clientX,
      startY: e.clientY,
      origLeft: parseFloat(cb.style.left) || 0,
      cb: cb,
      infoEl: null,
      savedOverflowY: savedOverflowY
    };
    cb.classList.add('dragging');
    document.body.style.cursor = 'grabbing';
    document.body.style.userSelect = 'none';
    _dragInProgress = true;
  });
}

// Fade drag handlers: document-level so they keep firing even if the
// mouse leaves the clip block during the drag.
document.addEventListener('mousemove', function(e) {
  if (!_fadeDrag) return;
  e.preventDefault();
  var dx = e.clientX - _fadeDrag.startX;
  var dSamples = Math.round(dx * _fadeDrag.samplesPerPx);
  var pxPerSec = 80;
  var sr = 48000;
  if (_fadeDrag.edge === 'in') {
    var fadeIn = Math.max(0, dSamples);
    if (_fadeDrag.origClipInfo) {
      if (fadeIn > _fadeDrag.origClipInfo[1]) fadeIn = _fadeDrag.origClipInfo[1];
    }
    cn('nativeSetFadeIn', _fadeDrag.trackIdx + ',' + _fadeDrag.clipIdx + ',' + fadeIn);
    // Real-time visual feedback: resize the fade-in overlay
    var fiEl = _fadeDrag.cb && _fadeDrag.cb.querySelector('.fade-in');
    if (fiEl) {
      var fiPx = Math.round((fadeIn / sr) * pxPerSec);
      fiEl.style.width = Math.max(0, Math.min(fiPx, _fadeDrag.cb.offsetWidth)) + 'px';
    }
  } else {
    var fadeOut = Math.max(0, dSamples);
    cn('nativeSetFadeOut', _fadeDrag.trackIdx + ',' + _fadeDrag.clipIdx + ',' + fadeOut);
    // Real-time visual feedback: resize the fade-out overlay
    var foEl = _fadeDrag.cb && _fadeDrag.cb.querySelector('.fade-out');
    if (foEl) {
      var foPx = Math.round((fadeOut / sr) * pxPerSec);
      foEl.style.width = Math.max(0, Math.min(foPx, _fadeDrag.cb.offsetWidth)) + 'px';
    }
  }
});

document.addEventListener('mouseup', function(e) {
  if (!_fadeDrag) return;
  _fadeDrag = null;
  document.body.style.userSelect = '';
  // Cursor is restored by the CSS class on #track-list; we just need
  // to re-apply it in case the browser cleared inline styles.
  if (typeof setTool === 'function') setTool(_tool);
});

document.addEventListener('mousemove', function(e) {
  if (!clipDrag) return;
  e.preventDefault();
  var pxPerSec = 80;

  // Pure delta: clip moves exactly the same pixel distance as the mouse.
  // Both e.clientX and origLeft are CSS-pixel values, so the delta
  // applies 1:1 regardless of any parent offset.
  var dx = e.clientX - clipDrag.startX;
  var newLeft = Math.round(Math.max(0, clipDrag.origLeft + dx));
  clipDrag.cb.style.left = newLeft + 'px';

  // Position overlay
  var clipSec = newLeft / pxPerSec;
  var clipM = Math.floor(clipSec / 60);
  var clipS = Math.floor(clipSec % 60);
  var clipMs = Math.floor((clipSec - Math.floor(clipSec)) * 1000);
  var posText = String(clipM).padStart(2,'0') + ':' + String(clipS).padStart(2,'0') + '.' + String(clipMs).padStart(3,'0');
  if (!clipDrag.infoEl) {
    clipDrag.infoEl = document.createElement('div');
    clipDrag.infoEl.style.cssText = 'position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:#1a1a24;border:1px solid #2a2a3a;border-radius:6px;padding:4px 12px;font-size:12px;color:#e8e8f0;z-index:100;pointer-events:none';
    document.body.appendChild(clipDrag.infoEl);
  }
  clipDrag.infoEl.textContent = posText;

  // Vertical drag — detect target track
  var trackList = document.getElementById('track-list');
  if (trackList) {
    var tracks = trackList.querySelectorAll('.track');
    var found = -1;
    tracks.forEach(function(t, idx) {
      var r = t.getBoundingClientRect();
      if (e.clientY >= r.top && e.clientY < r.bottom) found = idx;
    });
    tracks.forEach(function(t) { t.classList.remove('drag-target'); });
    if (found >= 0 && found !== clipDrag.trackIdx) {
      tracks[found].classList.add('drag-target');
    }
  }
});

document.addEventListener('mouseup', function(e) {
  if (!clipDrag) return;
  clipDrag.cb.classList.remove('dragging');
  if (clipDrag.infoEl) { clipDrag.infoEl.remove(); clipDrag.infoEl = null; }

  // Restore scroll and body styles frozen during drag
  var tl = document.getElementById('track-list');
  if (tl) tl.style.overflowY = clipDrag.savedOverflowY || '';
  document.body.style.userSelect = '';
  // Re-apply the active tool's cursor so the visual hint survives
  // the drag (clipDrag unconditionally sets body.style.cursor).
  if (typeof setTool === 'function') setTool(_tool);

  var pxPerSec = 80;
  var sr = 48000;

  // Re‑compute from the mouse position AT RELEASE so that any pixels
  // moved since the last mousemove event are included.
  var dx = e.clientX - clipDrag.startX;
  var finalLeft = Math.round(Math.max(0, clipDrag.origLeft + dx));
  clipDrag.cb.style.left = finalLeft + 'px';
  var newClipStart = Math.round((finalLeft / pxPerSec) * sr);

  // Determine target track
  var trackList = document.getElementById('track-list');
  var targetTrack = clipDrag.trackIdx;
  if (trackList) {
    var tracks = trackList.querySelectorAll('.track');
    tracks.forEach(function(t) { t.classList.remove('drag-target'); });
    tracks.forEach(function(t, idx) {
      var r = t.getBoundingClientRect();
      if (e.clientY >= r.top && e.clientY < r.bottom) targetTrack = idx;
    });
  }

  if (targetTrack !== clipDrag.trackIdx) {
    log('INFO', 'CLIP', 'Move clip ' + clipDrag.trackIdx + ':' + clipDrag.clipIdx +
        ' → ' + targetTrack + ' at ' + newClipStart);
    var s = clipDrag.trackIdx, c = clipDrag.clipIdx, d = targetTrack;
    // Remove the DOM element immediately so the clip doesn't appear in the
    // source track. The next telemetry tick will re-render everything.
    if (clipDrag.cb && clipDrag.cb.parentNode) clipDrag.cb.remove();
    if (d >= STATE.trackCount) {
      var n = cn('nativeAddTrack');
      if (typeof n === 'number' && n >= 0) {
        STATE.trackCount++;
        d = n;
        cn('nativeMoveClip', s + ',' + c + ',' + d + ',0,' + newClipStart);
        STATE._needsTrackRender = true;
      }
    } else {
      cn('nativeMoveClip', s + ',' + c + ',' + d + ',0,' + newClipStart);
      STATE._needsTrackRender = true;
    }
  } else {
    log('INFO', 'CLIP', 'Change clipStart track ' + clipDrag.trackIdx +
        ' clip ' + clipDrag.clipIdx + ' → ' + newClipStart);
    cn('nativeSetClipStart', clipDrag.trackIdx + ',' + clipDrag.clipIdx + ',' + newClipStart);
    STATE._needsTrackRender = true;
  }
  _dragInProgress = false;
  clipDrag = null;
});

// ── INIT ──
function renderAll() {
  renderTrackList();
  renderMixerTracks();
  drawRuler();
  var tc = document.getElementById('track-count');
  if (tc) tc.textContent = STATE.trackCount + ' track' + (STATE.trackCount !== 1 ? 's' : '');
  log('DEBUG', 'UI', 'renderAll complete');
}

log('INFO', 'SYS', 'Hydraw DAW UI loaded, waiting for native telemetry...');
