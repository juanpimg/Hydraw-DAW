<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hydraw DAW</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{
  /* ── Core: warm carbon base, Slate text hierarchy ── */
  /* Background — deep carbon, never pure black to reduce eye strain */
  --bg:#121417;--bg2:#171a1f;--bg3:#1d2026;--bg4:#22262d;
  --bg5:#282c34;
  --bg-hover:#1a1d23;--bg-sel:#1e212a;--bg-sel-th:#232632;
  --bg-clip:#0e1013;--bg-raised:#1b1e25;--bg-deep:#090b0d;
  --bg-hover-item:#22262e;
  /* Borders — crisp separation with subtle white overlay */
  --bd:#262a31;--bd2:#2e333b;--bd3:#363c46;--bd-hover:#404652;
  --bd-deep:#1c1f25;
  /* Text — Slate palette for warm, readable grays */
  --txt:#E2E8F0;--txt2:#CBD5E1;--txt3:#94A3B8;--txt4:#64748B;
  --txt-dim:#475569;--txt-disabled:#1e2128;
  /* Accent — cool blue pops against warm carbon */
  --accent:#5599ff;--accent2:#77bbff;
  --accent-bg:rgba(85,153,255,0.12);--accent-bg-hover:rgba(85,153,255,0.06);
  --accent-bg-strong:#1b2d4a;--accent-bg-soft:#1a2840;
  /* Status — vivid semantic colors */
  --red:#ef4444;--green:#44bb66;--yellow:#eab308;--cyan:#22d3ee;
  --red-bg:#1c0e0e;--red-bd:#5a2020;
  --yellow-bg:#1c1408;--yellow-bd:#5a3a10;
  --green-glow:rgba(68,187,102,0.25);
  /* Typography */
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
  --font-mono:'SF Mono',ui-monospace,monospace;
  /* Font sizes */
  --fs-xs:8px;--fs-sm:9px;--fs-base:10px;--fs-md:11px;--fs-lg:12px;--fs-xl:13px;--fs-2xl:15px;
  /* Spacing */
  --sp-1:2px;--sp-2:4px;--sp-3:6px;--sp-4:8px;--sp-5:10px;--sp-6:12px;--sp-7:14px;--sp-8:16px;--sp-10:18px;
  /* Shadows */
  --shadow-md:0 4px 20px rgba(0,0,0,0.7);--shadow-lg:0 12px 48px rgba(0,0,0,0.8);
  /* Border radius */
  --r-sm:2px;--r-md:4px;--r-lg:6px;--r-xl:8px;--r-2xl:12px;--r-full:50%;
  /* Transitions */
  --tr-fast:0.1s ease;--tr-base:0.12s ease;--tr-slow:0.15s ease;--tr-vu:0.03s ease;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;overflow:hidden;
  font-family:var(--font-sans);
  background:var(--bg);color:var(--txt);font-size:var(--fs-lg);-webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--txt-disabled);border-radius:var(--r-md)}
::-webkit-scrollbar-thumb:hover{background:var(--txt-dim)}
::selection{background:var(--accent-bg-strong);color:#E2E8F0}
#app{display:grid;grid-template-rows:48px 1fr;height:100vh;user-select:none}

/* ── TRANSPORT ── */
#transport{
  display:flex;align-items:center;gap:var(--sp-4);padding:0 var(--sp-8);
  background:var(--bg2);border-bottom:1px solid var(--bd);
}
#transport button{
  cursor:pointer;border:none;border-radius:var(--r-xl);padding:6px var(--sp-5) 7px;
  font-size:var(--fs-xl);line-height:1;transition:var(--tr-slow);
  background:var(--bg4);color:var(--txt3);font-family:inherit;
}
#transport button:hover{background:var(--bd2);color:var(--txt)}
#transport button:active{transform:scale(0.94)}
#transport button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
#btn-play{min-width:38px;text-align:center;border-radius:var(--r-full)!important;width:32px;height:32px;padding:0!important;display:flex;align-items:center;justify-content:center}
#btn-play:hover{background:var(--accent-bg-strong);color:var(--accent)}
#btn-play.playing{background:var(--accent-bg-strong);color:var(--accent)}
#btn-stop{border-radius:var(--r-full)!important;width:32px;height:32px;padding:0!important;display:flex;align-items:center;justify-content:center}
#transport .time{
  font-size:var(--fs-2xl);color:var(--cyan);min-width:96px;margin-left:auto;
  font-variant-numeric:tabular-nums;font-family:var(--font-mono);
  background:var(--bg-deep);border:1px solid var(--bd-deep);border-radius:var(--r-lg);
  padding:var(--sp-1) var(--sp-5);letter-spacing:1px;text-shadow:0 0 10px rgba(34,211,238,0.35);
}
#transport .status{font-size:var(--fs-sm);color:var(--txt4);letter-spacing:2px;font-weight:700;min-width:36px}
#transport .status.on{color:var(--accent)}
#transport .sm-btn{
  cursor:pointer;border:none;border-radius:5px;padding:var(--sp-1) var(--sp-4);
  font-size:var(--fs-sm);line-height:1.5;font-family:inherit;
  background:var(--bg3);color:var(--txt4);transition:var(--tr-base);
}
#transport .sm-btn:hover{background:var(--bg4);color:var(--txt2)}
#transport .sm-btn.playing{background:var(--accent-bg-strong);color:var(--accent)}
#transport .sm-btn.on{background:var(--accent-bg-soft);color:var(--accent2)}
#transport .btn-track{cursor:pointer;border:none;border-radius:var(--r-lg);padding:var(--sp-2) var(--sp-6);font-size:var(--fs-md);line-height:1;background:var(--bg4);color:var(--txt3);transition:var(--tr-base);font-family:inherit}
#transport .btn-track:hover{background:var(--bd2);color:var(--txt)}
#track-count{font-size:var(--fs-base);color:var(--txt4)}
#transport .bpm-wrap{display:inline-flex;align-items:center;gap:var(--sp-2);background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r-md);padding:2px 6px;height:24px}
#transport .bpm-input{width:42px;background:transparent;border:none;color:var(--txt);font-size:var(--fs-md);font-family:var(--font-mono);text-align:right;outline:none;-moz-appearance:textfield}
#transport .bpm-input::-webkit-outer-spin-button,#transport .bpm-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
#transport .bpm-label{font-size:var(--fs-xs);color:var(--txt4);font-family:var(--font-mono);letter-spacing:0.5px}
#transport .ts-wrap{display:inline-flex;align-items:center;gap:var(--sp-1);background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r-md);padding:2px 6px;height:24px}
#transport .ts-input{width:22px;background:transparent;border:none;color:var(--txt);font-size:var(--fs-md);font-family:var(--font-mono);text-align:center;outline:none;-moz-appearance:textfield}
#transport .ts-input::-webkit-outer-spin-button,#transport .ts-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
#transport .ts-slash{color:var(--txt4);font-size:var(--fs-md);font-family:var(--font-mono)}
#transport .bar-display{font-size:var(--fs-md);color:var(--accent2);font-family:var(--font-mono);min-width:30px;text-align:center;padding:0 var(--sp-3);background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r-md);height:24px;line-height:22px}
#transport .tool-group{display:inline-flex;align-items:center;gap:2px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r-md);padding:2px;height:28px}
#transport .tool-group .sm-btn{height:22px;min-width:24px;padding:0 4px}

/* ── MAIN ── */
#main{display:flex;flex-direction:column;overflow:hidden}
#tl-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;border-bottom:1px solid var(--bd)}
#divider{height:4px;min-height:4px;cursor:row-resize;background:var(--bg3);flex-shrink:0;transition:background var(--tr-fast)}
#divider:hover{background:var(--bd2)}
#bottom{overflow:hidden;flex-shrink:0;min-height:120px;max-height:70vh}

/* ── RULER ── */
#ruler{height:26px;background:var(--bg);border-bottom:1px solid var(--bd);position:relative;flex-shrink:0}
#ruler canvas{display:block;width:100%}
#tl-scrollbar{height:10px;background:var(--bg);flex-shrink:0;position:relative}
#tl-scrollbar input[type=range]{width:calc(100% - 140px);height:10px;margin:0;padding:0;-webkit-appearance:none;appearance:none;background:transparent;display:block;position:absolute;top:0;left:140px}
#tl-scrollbar input[type=range]::-webkit-slider-runnable-track{height:3px;background:var(--bg4);border-radius:var(--r-sm);margin-top:3px}
#tl-scrollbar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:14px;border-radius:var(--r-md);background:var(--accent);border:none;margin-top:-5px;cursor:pointer}

/* ── TRACK LIST ── */
#track-list{flex:1;overflow-y:auto}
#track-list.drag-enter{background:var(--accent-bg-hover)}
.track{
  display:flex;height:48px;border-bottom:1px solid var(--bg3);cursor:pointer;
  transition:background var(--tr-fast);
}
.track:hover{background:var(--bg-hover)}
.track.sel{background:var(--bg-sel)}
.track.sel .th{background:var(--bg-sel-th)}
.track.drag-over{background:var(--accent-bg)}
.track.drag-over .clip{border:1px dashed var(--accent);border-radius:var(--r-lg)}
.track .th{
  min-width:140px;max-width:140px;display:flex;align-items:center;
  padding:0 var(--sp-5);gap:5px;border-right:1px solid var(--bd);background:var(--bg-hover);
}
.track .th .tn{
  font-size:var(--fs-lg);color:var(--txt);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;flex:1;font-weight:500
}
.track .th .tb{
  font-size:var(--fs-xs);padding:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-md);border:1px solid var(--bd2);background:transparent;color:var(--txt4);
  cursor:pointer;transition:var(--tr-base);line-height:1;font-family:inherit;font-weight:700;
}
.track .th .tb:hover{border-color:var(--bd-hover);background:var(--bg-sel-th)}
.track .th .tb:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.track .th .tb.on-m{color:var(--red);border-color:var(--red-bd);background:var(--red-bg);box-shadow:0 0 10px rgba(239,68,68,0.2)}
.track .th .tb.on-s{color:var(--yellow);border-color:var(--yellow-bd);background:var(--yellow-bg);box-shadow:0 0 10px rgba(234,179,8,0.2)}
.track .th .tb.on-a{color:var(--red);border-color:var(--red-bd);background:var(--red-bg);box-shadow:0 0 10px rgba(239,68,68,0.2)}
.track .clip{flex:1;position:relative;overflow:hidden;background:var(--bg-clip)}
.track .clip canvas.wf{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.track .clip .drop-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:var(--txt-dim);font-size:var(--fs-base);pointer-events:none;letter-spacing:0.5px;
}
.clip-block{
  position:absolute;top:2px;bottom:2px;border-radius:5px;
  background:var(--accent-bg);border:1px solid rgba(85,153,255,0.25);
  cursor:grab;overflow:hidden;z-index:2;min-width:16px;
}
/* Tool cursors: applied as a class on the track-list container so
   the cursor cascades down to all .clip-block children. Using
   !important so it wins over the per-element cursor:grab declared
   on .clip-block above. */
#track-list.tool-split .clip-block,
#track-list.tool-split{cursor:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23e2e8f0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='6' cy='6' r='3' fill='%23121714'/><circle cx='6' cy='18' r='3' fill='%23121714'/><line x1='20' y1='4' x2='8.12' y2='15.88'/><line x1='14.47' y1='14.48' x2='20' y2='20'/><line x1='8.12' y1='8.12' x2='12' y2='12'/></svg>") 12 12,crosshair !important}
#track-list.tool-fade .clip-block,
#track-list.tool-fade{cursor:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23e2e8f0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M5 19V5'/><path d='M19 5v14'/><path d='M5 19c0-8 14-8 14-14' fill='%235599ff33'/></svg>") 12 12,ew-resize !important}
.clip-scroll{position:absolute;top:0;left:0;right:0;bottom:0}
.clip-block.dragging{opacity:0.85;z-index:10;cursor:grabbing;box-shadow:var(--shadow-md)}
.clip-block .clip-label{
  position:absolute;bottom:3px;left:var(--sp-4);font-size:var(--fs-sm);
  color:rgba(200,200,240,0.6);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:calc(100% - 16px);pointer-events:none;z-index:1;
}
/* Fade handle: shows the actual fade area with a visible gradient.
   Clickable so the user can drag to resize the fade. The width is
   set dynamically from the telemetry fadeIn/fadeOut value. */
.clip-block .fade-in,
.clip-block .fade-out{
  position:absolute;top:0;bottom:0;min-width:0;z-index:3;
}
.clip-block .fade-in{left:0;background:linear-gradient(to right,rgba(85,153,255,0.5),rgba(85,153,255,0.08));border-top-left-radius:5px;border-bottom-left-radius:5px;border-right:1px solid rgba(85,153,255,0.3)}
.clip-block .fade-out{right:0;background:linear-gradient(to left,rgba(85,153,255,0.5),rgba(85,153,255,0.08));border-top-right-radius:5px;border-bottom-right-radius:5px;border-left:1px solid rgba(85,153,255,0.3)}
/* In fade tool mode, show ew-resize on fade overlays */
#track-list.tool-fade .clip-block .fade-in,
#track-list.tool-fade .clip-block .fade-out{cursor:ew-resize !important}
.track.drag-target{background:var(--accent-bg)}
.track.drag-target .clip{border:1px dashed var(--accent);border-radius:var(--r-lg)}
.track.add-track:hover{background:var(--bg4)}
.track.add-track:hover .clip{color:var(--txt3)!important}

/* ── BOTTOM PANELS ── */
#bottom{display:grid;grid-template-columns:180px 1fr 280px;overflow:hidden}
.panel{display:flex;flex-direction:column;border-right:1px solid var(--bd);overflow:hidden}
.panel:last-child{border-right:none}
.ph{
  font-size:var(--fs-sm);color:var(--txt3);padding:7px var(--sp-6);
  background:var(--bg2);border-bottom:1px solid var(--bd);
  letter-spacing:1.8px;font-weight:700;flex-shrink:0;
}

/* ── BROWSER ── */
#browser-list{flex:1;overflow-y:auto;padding:var(--sp-2) var(--sp-3)}
#browser-list .item{padding:3px var(--sp-4);cursor:pointer;border-radius:var(--r-md);color:var(--txt2);font-size:var(--fs-md);transition:var(--tr-fast)}
#browser-list .item:hover{background:var(--bg-hover-item);color:var(--txt)}
#browser-list .item.dir{color:#6699cc}
#browser-list .item.dir:hover{color:#88bbee}
#browser-list .item.audio{color:var(--green)}
#browser-list .item.audio:hover{color:#88ddaa}
#browser-error{color:var(--red);font-size:var(--fs-base);padding:var(--sp-2) var(--sp-4);display:none}

/* ── FX CHAIN ── */
#fx{display:flex;flex-direction:column}
#fx-body{display:flex;flex:1;overflow:hidden}
#fx-plugins{flex:1;overflow:hidden;display:flex;flex-direction:column;border-right:1px solid var(--bd)}
#fx-plugins #plugin-list{flex:1;overflow-y:auto;padding:var(--sp-3)}
#fx-controls{width:210px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;gap:var(--sp-3);padding:var(--sp-4) var(--sp-6)}
#fx-controls .row{display:flex;align-items:center;gap:var(--sp-4)}
#fx-controls .row label{color:var(--txt3);min-width:26px;font-size:var(--fs-md);font-weight:500}
#fx-controls .row input[type=range]{flex:1;max-width:110px;height:3px;border-radius:var(--r-sm);background:var(--bg4)}
#fx-controls .row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:var(--r-full);background:var(--accent);border:2px solid var(--bg-deep);cursor:pointer;transition:transform var(--tr-fast)}
#fx-controls .row input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}
#fx-controls .row input[type=range]::-webkit-slider-runnable-track{height:3px;border-radius:var(--r-sm);background:var(--bg4)}
#fx-controls .row .val{color:var(--txt2);font-size:var(--fs-base);min-width:32px;text-align:right;font-variant-numeric:tabular-nums}
.fx-ctl{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:var(--r-md);cursor:pointer;font-size:var(--fs-base);font-weight:700;color:var(--txt3);background:var(--bg3);border:1px solid var(--bd);transition:var(--tr-base)}
.fx-ctl:hover{color:var(--txt);background:var(--bg2);border-color:var(--txt4)}
.fx-ctl.on-m{color:var(--red);border-color:var(--red-bd);background:var(--red-bg);box-shadow:0 0 8px rgba(239,68,68,0.2)}
.fx-ctl.on-s{color:var(--yellow);border-color:var(--yellow-bd);background:var(--yellow-bg);box-shadow:0 0 8px rgba(234,179,8,0.2)}
.fx-ctl.on-a{color:var(--red);border-color:var(--red-bd);background:var(--red-bg);box-shadow:0 0 8px rgba(239,68,68,0.2)}
.fx-add{font-size:var(--fs-base);padding:var(--sp-2) var(--sp-6);cursor:pointer;border:1px solid var(--bd);border-radius:var(--r-lg);background:var(--bg3);color:var(--txt3);transition:var(--tr-base);font-family:inherit;margin-left:var(--sp-2)}
.fx-add:hover{background:var(--bg2);color:var(--txt);border-color:var(--accent)}
#plugin-list .pl{display:flex;align-items:center;gap:var(--sp-3);padding:5px var(--sp-4);border-radius:5px}
#plugin-list .pl:hover{background:var(--bg-hover-item)}
#plugin-list .pl .pn{color:var(--txt);flex:1;font-size:var(--fs-md);cursor:pointer;transition:var(--tr-fast);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#plugin-list .pl .pn:hover{color:var(--accent)}
#plugin-list .pl .pb{color:var(--txt4);cursor:pointer;font-size:var(--fs-lg);transition:var(--tr-fast)}
#plugin-list .pl .pb:hover{color:var(--txt2)}
#plugin-list .pl .pb.bypassed{color:var(--green)}
#plugin-list .pl .px{color:#5a3030;cursor:pointer;font-size:var(--fs-sm);transition:var(--tr-fast)}
#plugin-list .pl .px:hover{color:var(--red)}
#plugin-list .pl .pm{display:flex;flex-direction:column;gap:0;line-height:0}
#plugin-list .pl .pm span{color:var(--txt-dim);cursor:pointer;font-size:var(--fs-sm);line-height:1;padding:0 var(--sp-1);transition:var(--tr-fast);user-select:none}
#plugin-list .pl .pm span:hover{color:var(--accent)}
#plugin-list .pl .pm span.dis{color:var(--txt-disabled);cursor:default}
#plugin-list .pl .pm span.dis:hover{color:var(--txt-disabled)}
#plugin-list .pl .pos{color:var(--txt-dim);font-size:var(--fs-sm);width:14px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
#plugin-list .pl-add{padding:var(--sp-3) var(--sp-4);margin:var(--sp-2) 0;border-radius:5px;font-size:var(--fs-md);color:var(--txt4);cursor:pointer;text-align:center;border:1px dashed var(--bd2);transition:var(--tr-base)}
#plugin-list .pl-add:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-bg-hover)}

/* ── MIXER ── */
#mixer-scroll{flex:1;overflow-x:auto;overflow-y:hidden}
#mixer-channels{display:flex;height:100%}
.ch{
  min-width:72px;max-width:72px;display:flex;flex-direction:column;
  align-items:center;padding:5px var(--sp-1) 3px;border-right:1px solid var(--bg3);flex-shrink:0;
}
.ch.sel{background:var(--bg3)}
.ch .cn{font-size:var(--fs-sm);color:var(--txt3);white-space:nowrap;overflow:hidden;max-width:68px;text-overflow:ellipsis;font-weight:600;letter-spacing:0.3px}
.ch .strip{display:flex;gap:5px;width:100%;flex:1;min-height:50px}
.ch .mc{width:12px;background:var(--bg);border-radius:var(--r-sm);overflow:hidden;flex-shrink:0;margin-bottom:var(--sp-1);position:relative;flex:1}
.ch .mc .mf{
  position:absolute;bottom:0;left:0;width:100%;height:100%;border-radius:var(--r-sm);
  transition:transform var(--tr-vu);transform-origin:bottom;
  background:linear-gradient(to top,#22c55e 0%,#eab308 55%,#ef4444 80%);
  box-shadow:0 0 6px var(--green-glow);
}
.ch .fw{flex:1;display:flex;align-items:flex-end;justify-content:center;min-height:0;padding-bottom:1px}
.ch .fw input[type=range]{
  writing-mode:bt-lr;-webkit-appearance:slider-vertical;appearance:slider-vertical;
  width:18px;flex:1;min-height:0;background:transparent;border-radius:0;
}
.ch .fw input[type=range]::-webkit-slider-runnable-track{width:2px;background:var(--bg4);border-radius:1px}
.ch .fw input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:6px;border-radius:var(--r-sm);
  background:var(--accent);border:none;cursor:pointer;margin-left:-7px;
  transition:background var(--tr-fast);
}
.ch .fw input[type=range]::-webkit-slider-thumb:hover{background:var(--accent2)}
.ch .db{font-size:var(--fs-xs);color:var(--txt4);margin:var(--sp-1) 0 1px;font-variant-numeric:tabular-nums;letter-spacing:0.2px}
.ch .cbs{display:flex;gap:var(--sp-1);margin-top:1px}
.ch .cbs button{
  font-size:7px;padding:0;width:18px;height:14px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-sm);border:1px solid var(--bd);background:transparent;color:var(--txt4);
  cursor:pointer;transition:var(--tr-fast);font-family:inherit;line-height:1;font-weight:700;
}
.ch .cbs button:hover{border-color:var(--bd3);color:var(--txt2)}
.ch .cbs button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.ch .cbs button.on-m{color:var(--red);border-color:var(--red-bd);background:var(--red-bg)}
.ch .cbs button.on-s{color:var(--yellow);border-color:var(--yellow-bd);background:var(--yellow-bg)}
.ch .cbs button.on-a{color:var(--red);border-color:var(--red-bd);background:var(--red-bg)}
#mixer-body{display:flex;flex:1;overflow:hidden}
#master-channel{
  width:72px;flex-shrink:0;border-left:2px solid var(--bd);
  display:flex;flex-direction:column;align-items:center;padding:5px var(--sp-1) 3px;background:var(--bg2);
}
#master-channel.sel{background:var(--bg3)}
.master-ch{display:flex;flex-direction:column;flex:1;width:100%}
.master-cn{font-size:var(--fs-sm);color:var(--txt2);margin:1px 0;font-weight:700;letter-spacing:0.5px;white-space:nowrap}
.master-strip{flex:1;display:flex;gap:5px;width:100%;min-height:50px}
.master-mc{width:12px;background:var(--bg);border-radius:var(--r-sm);overflow:hidden;flex-shrink:0;margin-bottom:var(--sp-1);position:relative}
.master-mf{position:absolute;bottom:0;left:0;width:100%;height:100%;border-radius:var(--r-sm);
  transition:transform var(--tr-vu);transform-origin:bottom;
  background:linear-gradient(to top,#22c55e 0%,#eab308 55%,#ef4444 80%);
  box-shadow:0 0 6px var(--green-glow);
}
.master-fw{flex:1;display:flex;align-items:flex-end;justify-content:center;min-height:0}
.master-fw input[type=range]{
  writing-mode:bt-lr;-webkit-appearance:slider-vertical;appearance:slider-vertical;
  width:18px;flex:1;min-height:0;background:transparent;border-radius:0;
}
.master-fw input[type=range]::-webkit-slider-runnable-track{width:2px;background:var(--bg4);border-radius:1px}
.master-fw input[type=range]::-webkit-slider-thumb{

}

/* ── POPUP ── */
#popup-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100}
#popup{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--bg-raised);border:1px solid var(--bd3);border-radius:var(--r-2xl);
  padding:var(--sp-10);min-width:340px;max-height:460px;overflow-y:auto;
  z-index:101;box-shadow:var(--shadow-lg);
}
#popup .pitem{font-size:var(--fs-lg);padding:7px var(--sp-6);cursor:pointer;border-radius:var(--r-lg);color:var(--txt2);transition:var(--tr-fast)}
#popup .pitem:hover{background:var(--bg4);color:var(--txt)}
#popup input{width:100%;box-sizing:border-box;padding:var(--sp-3) var(--sp-5);border-radius:var(--r-lg);border:1px solid var(--bd3);background:var(--bg2);color:var(--txt);font-size:var(--fs-lg);outline:none;margin-bottom:var(--sp-4)}
#popup input:focus{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
#popup .pnone{color:var(--txt4);font-size:var(--fs-base);text-align:center;padding:var(--sp-7)}

<body>
<div id="app">
  <div id="transport">
    <button id="btn-play" onclick="togglePlay()">
      <svg id="play-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
      <svg id="pause-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
    </button>
    <button id="btn-stop" onclick="cn('nativeStop')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16"/></svg>
    </button>
    <span class="time" id="time">00:00.000</span>
    <span class="status" id="status">STOP</span>
    <span class="bpm-wrap" title="Tempo">
      <input type="number" id="bpm-input" class="bpm-input" min="20" max="300" step="0.01" value="120" onchange="setBPM(this.value)">
      <span class="bpm-label">BPM</span>
    </span>
    <span class="ts-wrap" title="Time signature">
      <input type="number" id="ts-num" class="ts-input" min="1" max="32" step="1" value="4" onchange="setTimeSig()">
      <span class="ts-slash">/</span>
      <input type="number" id="ts-den" class="ts-input" min="1" max="32" step="1" value="4" onchange="setTimeSig()">
    </span>
    <span class="bar-display" id="bar-display" title="Bar : Beat">1.1</span>
    <span class="tool-group" title="Edit tool">
      <button class="sm-btn on" id="tool-pointer" onclick="setTool('pointer')" title="Pointer (select / move)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M5.5 3.21V20.8c0 .45.54.67.85.35l4.86-4.86 2.94 6.4c.5.1.8-.32.95-.62l1.69-3.65 3.65-1.69c.3-.15.72-.45.62-.95l-6.4-2.94 4.86-4.86c.32-.31.1-.85-.35-.85H5.5z"/></svg>
      </button>
      <button class="sm-btn" id="tool-split" onclick="setTool('split')" title="Split (click a clip to cut it at the playhead)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
      </button>
      <button class="sm-btn" id="tool-fade" onclick="setTool('fade')" title="Fade (drag the left/right edge of a clip to set fade in/out)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19V5"/><path d="M19 5v14"/><path d="M5 19c0-8 14-8 14-14"/></svg>
      </button>
    </span>
    <button class="sm-btn on" id="btn-scroll-mode" onclick="toggleScrollMode()" title="Scroll mode">C</button>
    <button class="btn-track" onclick="saveProject()" title="Save project">💾 Save</button>
    <button class="btn-track" onclick="loadProject()" title="Load project">📂 Load</button>
    <button class="btn-track" onclick="exportAudio()" title="Export to WAV">🎵 Export</button>
    <button class="btn-track" style="margin-left:auto" onclick="addTrack()">+ Track</button>
    <button class="btn-track" onclick="removeTrack()">− Track</button>
    <span id="track-count">1 track</span>
  </div>

  <div id="main">
    <div id="tl-wrap">
      <div id="ruler"><canvas id="ruler-cv"></canvas></div>
      <div id="tl-scrollbar"><input type="range" id="tl-scroll-range" min="0" value="0"></div>
      <div id="track-list"></div>
    </div>
    <div id="divider"></div>
    <div id="bottom" style="height:220px">
      <div class="panel" id="browser">
        <div class="ph">BROWSER</div>
        <div id="browser-path" style="font-size:10px;color:#CBD5E1;padding:3px 8px;border-bottom:1px solid var(--bd2);overflow:hidden;white-space:nowrap"></div>
        <div id="browser-error"></div>
        <div id="browser-list"></div>
      </div>
      <div class="panel" id="fx">
        <div class="ph">FX CHAIN <span style="color:#64748B" id="fx-track-label">Track 1</span></div>
        <div id="fx-body">
          <div id="fx-plugins">
            <div id="plugin-list"></div>
          </div>
          <div id="fx-controls">
            <div class="row"><label>Vol</label><input type="range" id="fx-vol" min="0" max="1.5" step="0.01" value="1" oninput="onFxVol()"><span class="val" id="fx-vol-v">1.00</span></div>
            <div class="row"><label>Pan</label><input type="range" id="fx-pan" min="-1" max="1" step="0.01" value="0" oninput="onFxPan()"><span class="val" id="fx-pan-v">C</span></div>
            <div class="row" style="gap:8px;justify-content:center">
              <label class="fx-ctl" id="fxm" onclick="doMute(STATE.sel)">M</label>
              <label class="fx-ctl" id="fxs" onclick="doSolo(STATE.sel)">S</label>
              <label class="fx-ctl" id="fxr" onclick="doArm(STATE.sel)">R</label>
            </div>
          </div>
        </div>
      </div>
      <div class="panel" id="mixer">
        <div class="ph">MIXER</div>
        <div id="mixer-body">
          <div id="mixer-scroll"><div id="mixer-channels"></div></div>
          <div id="master-channel">
              <div class="master-ch" onclick="selectTrack(-1)" style="cursor:pointer">
              <span class="master-cn">Master</span>
              <div class="master-strip">
                <div class="master-mc"><div class="master-mf" id="master-vu"></div></div>
                <div class="master-fw">
                  <input type="range" id="master-fd" min="0" max="1.5" step="0.01" value="1"
                         oninput="onMasterFader(this.value)" ondblclick="this.value=1;onMasterFader(1)">
                </div>
              </div>
              <span class="master-db" id="master-db">+0.0 dB</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="popup-bg" onclick="closePopup()"></div>
<div id="popup"></div>

<script>
// ── EXHAUSTIVE LOGGING ──
var LOG_LEVELS = { DEBUG:0, INFO:1, WARN:2, ERROR:3 };
var LOG_CURRENT = LOG_LEVELS.INFO;
var LOG_BATCH = [];
var LOG_FLUSH_MS = 1000;
function log(level, label, msg) {
  var lv = LOG_LEVELS[level];
  if (lv === undefined || lv < LOG_CURRENT) return;
  var t = new Date();
  var ts = t.toTimeString().slice(0,8) + '.' + String(t.getMilliseconds()).padStart(3,'0');
  var fn = lv >= LOG_LEVELS.ERROR ? console.error :
           lv >= LOG_LEVELS.WARN  ? console.warn  : console.log;
  fn('[' + ts + '] [' + level + '] [' + label + '] ' + msg);
  // Relay ALL log levels (not just WARN+) to C++ log file via nativeLog
  LOG_BATCH.push(level + ',' + label + ',' + msg.replace(/,/g,';'));
  if (LOG_BATCH.length >= 10) flushLogBatch();
}
function flushLogBatch() {
  if (LOG_BATCH.length === 0) return;
  var batch = LOG_BATCH.splice(0, LOG_BATCH.length);
  var fn = window.nativeLog;
  if (fn) { try { fn(batch.join('|')); } catch(e) {} }
}
setInterval(flushLogBatch, LOG_FLUSH_MS);

// Capture unhandled errors (SyntaxError, ReferenceError, etc.) to C++ log
window.addEventListener('error', function(e) {
  var msg = (e.error ? e.error.message : e.message) || String(e);
  // WebKitGTK false positives: suppress known non-actionable noise
  if (msg === 'Script error.' || (e.lineno === 1 && !e.colno)) {
    e.preventDefault();
    return;
  }
  log('ERROR', 'UNHANDLED', msg);
});
window.addEventListener('unhandledrejection', function(e) {
  log('ERROR', 'UNHANDLED', 'Promise: ' + (e.reason ? e.reason.message || String(e.reason) : String(e)));
});

function showError(msg) {
  log('ERROR', 'UI', msg);
  var el = document.getElementById('browser-error');
  if (el) { el.textContent = 'ERROR: ' + msg; el.style.display = 'block'; }
}

// ── STATE ──
var STATE = {
  playing: false, playhead: 0, trackCount: 1, sel: 0,
  peaks: [], masterPeakL: 0, masterPeakR: 0,
  volumes: [], mutes: [], solos: [], arms: [],
  names: [], audioFrames: [], clipStarts: [], peakCaches: [],
  clipBlocks: [], clipNames: [], clipPeakCaches: [],
  bpm: 120, timeSigNum: 4, timeSigDen: 4, sampleRate: 48000,
  browserPath: '', pluginsCache: [], initialized: false, tracksRendered: false
};
var lastUpdate = 0;
var _needsRulerRedraw = true;
var _needsWaveformRedraw = true;
var _lastRulerPlayhead = -1;
var _lastRulerScrollX = -1;
var _cachedTimelineWidth = 0;
var _timelineWidthDirty = true;

// Resolve CSS variable for canvas (getComputedStyle bridges var() to canvas)
function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

// ── NATIVE BRIDGE ──
// webview v0.12 bindings return Promises, so cn() returns the Promise.
// cn() → returns Promise of the native result
// cn.then(name, arg, callback) → convenience for Promise.then()
function cn(name, arg) {
  try {
    var fn = window[name];
    if (!fn) {
      log('WARN', 'BRIDGE', 'Function "' + name + '" not found on window');
      return null;
    }
    var input = arg === undefined ? '' : String(arg);
    var promise = fn(input);
    return promise;
  } catch(e) {
    log('ERROR', 'BRIDGE', name + ' exception: ' + (e.message || e));
    return null;
  }
}

// ── NATIVE UPDATE LOOP ──
// State for the generation counter. The C++ side bumps g_telemetryGen
// on every full push. The JS side stores the last seen gen and
// ignores stale full updates from a generation whose caches have
// been reset (e.g. by a subsequent __onProjectLoaded). See
// PERSISTENCE_SPEC.md §"C++ → JS telemetry".
var _lastSeenGen = -1;
var _currentLoadGen = -1;

function updateUIFromNative(payload) {
  // Defensive: if the payload is an array (legacy format from before
  // the JSON migration), wrap it into an object with positional keys.
  // This is a fallback only — the C++ side now always sends JSON.
  if (Array.isArray(payload)) {
    var a = payload;
    payload = {
      full: a[0], playing: a[1], playhead: a[2], trackCount: a[3],
      masterPeakL: a[4], masterPeakR: a[5], masterVolume: a[6], peaks: a[7],
      volumes: a[8], mutes: a[9], solos: a[10], arms: a[11],
      names: a[12], audioFrames: a[13], clipStarts: a[14]
    };
  }

  if (!payload || typeof payload !== 'object') {
    log('WARN', 'LOOP', 'Received invalid data from native');
    return;
  }

  // Generation check. A full update with gen < _lastSeenGen is stale:
  // its caches have been reset by a more recent __onProjectLoaded.
  // Drop it on the floor to prevent the post-load glitch.
  var gen = (payload.gen !== undefined) ? payload.gen : -1;
  var isFull = payload.full === 1;
  if (isFull && _lastSeenGen >= 0 && gen < _lastSeenGen) {
    log('WARN', 'LOOP', 'dropping stale full update gen=' + gen + ' (last=' + _lastSeenGen + ')');
    return;
  }

  // Debounce ONLY partial updates. Full updates carry structural
  // state changes (track list, audio frames, etc.) and MUST be
  // processed unconditionally — otherwise the rebuild check sees
  // stale _lastRenderedTrackCount and the new clips/waveforms never
  // appear.
  if (!isFull && Date.now() - lastUpdate < 25) return;
  lastUpdate = Date.now();

  // JSON-parsed object: read by name. No more positional index
  // fragility.
  STATE.playing = !!payload.playing;
  STATE.playhead = payload.playhead || 0;
  STATE.trackCount = payload.trackCount || 1;
  STATE.masterPeakL = payload.masterPeakL || 0;
  STATE.masterPeakR = payload.masterPeakR || 0;
  STATE.masterVolume = payload.masterVolume !== undefined ? payload.masterVolume : 1;
  STATE.peaks = payload.peaks || [];
  STATE.bpm = payload.bpm !== undefined ? payload.bpm : 120;
  STATE.timeSigNum = payload.timeSigNum !== undefined ? payload.timeSigNum : 4;
  STATE.timeSigDen = payload.timeSigDen !== undefined ? payload.timeSigDen : 4;

  if (isFull) {
    STATE.volumes = payload.volumes || [];
    STATE.mutes = payload.mutes || [];
    STATE.solos = payload.solos || [];
    STATE.arms = payload.arms || [];
    STATE.names = payload.names || [];
    STATE.audioFrames = payload.audioFrames || [];
    STATE.clipStarts = payload.clipStarts || [];
    STATE.clipBlocks = payload.clipBlocks || [];
    STATE.clipNames = payload.clipNames || [];
    STATE.clipPeakCaches = payload.clipPeakCaches || [];
    _lastSeenGen = gen;
    _needsRulerRedraw = true;
    _needsWaveformRedraw = true;
    _timelineWidthDirty = true;
  }

  // Defensive: ensure per-track arrays are at least trackCount long.
  // JSON.parse preserves exact element count, so this is normally a
  // no-op. It guards against C++ bugs that send a too-short array.
  while (STATE.audioFrames.length < STATE.trackCount) STATE.audioFrames.push(0);
  while (STATE.clipStarts.length < STATE.trackCount) STATE.clipStarts.push(0);

  // Rebuild the track list DOM if the structural state changed: track
  // count (add/remove) or any per-track audio frame count (load/clear
  // audio changes the visible clip block). Without this, the DOM is
  // frozen at the last full render — added tracks have no <div>, removed
  // tracks' <div>s linger with stale waveforms, and the inline
  // onclick="selectTrack(N)" handlers are bound to indices that no
  // longer match the current track layout.
  //
  // _forceFullRebuild is set by __onProjectLoaded. It bypasses the
  // structural-diff check entirely and forces a full rebuild on the
  // next update — this is the "audio plays but no waveforms" fix
  // because it guarantees the clip blocks are recreated even if the
  // new project happens to have the same track count as the old one.
  var _prevCount = STATE._lastRenderedTrackCount;
  var _prevAudio  = STATE._lastRenderedAudioFrames;
  var _prevBlocks = STATE._lastRenderedClipBlocks;
  var _curCount   = STATE.trackCount;
  var _curAudio   = STATE.audioFrames || [];
  var _curBlocks  = STATE.clipBlocks || [];

  // When the engine modifies a clip's AudioBuffer (split, trim,
  // fade, freeze, OR a same-length WAV replacement), the JS-side
  // cache of the primary's peak data becomes stale. The cache MUST
  // be invalidated on every full update for every track that has
  // audio — the C++ side now returns the correct cache in O(1) when
  // nothing changed, so the cost is a single async binding call.
  // RefreshPeaks() only fetches when STATE.peakCaches[i] is null.
  if (isFull) {
    for (var _ci2 = 0; _ci2 < _curCount; _ci2++) {
      if (_curAudio[_ci2] > 0) {
        STATE.peakCaches[_ci2] = null;
      }
    }
  }
  var _needRebuild = _forceFullRebuild
    || (_prevCount === undefined)
    || (_prevCount !== _curCount);
  if (!_needRebuild && isFull) {
    for (var _i = 0; _i < _curCount; _i++) {
      if ((_prevAudio[_i] || 0) !== (_curAudio[_i] || 0)) {
        _needRebuild = true;
        break;
      }
      if (_i >= (_prevAudio ? _prevAudio.length : 0)) { _needRebuild = true; break; }
      // Compare clip block counts too (a split can keep the
      // primary's frame count while changing the total layout).
      var curN = (_curBlocks[_i] || []).length;
      var prevN = (_prevBlocks && _prevBlocks[_i]) ? _prevBlocks[_i].length : 0;
      if (curN !== prevN) { _needRebuild = true; break; }
      for (var _ci = 0; _ci < curN; _ci++) {
        var curC = _curBlocks[_i][_ci];
        var prevC = _prevBlocks[_i][_ci];
        if (!prevC || curC[0] !== prevC[0] || curC[1] !== prevC[1]) {
          _needRebuild = true; break;
        }
      }
      if (_needRebuild) break;
    }
  }
  if (_forceFullRebuild) {
    log('INFO', 'UI', 'forced rebuild (post-load): gen=' + gen + ' prevCount=' + _prevCount +
         ' curCount=' + _curCount + ' curAudio=' + JSON.stringify(_curAudio));
  }
  if (_needRebuild) {
    if (!_forceFullRebuild) {
      log('INFO', 'UI', 'rebuild: gen=' + gen + ' prevCount=' + _prevCount + ' curCount=' + _curCount +
           ' prevAudio=' + JSON.stringify(_prevAudio || []) + ' curAudio=' + JSON.stringify(_curAudio));
    }
    renderTrackList();
    // Mixer channels mirror the track list: same count, same
    // names, same per-track state (volume, mute, solo, arm). If
    // the track list needs rebuilding, the mixer does too —
    // otherwise after a project load the timeline shows the new
    // tracks correctly but the mixer panel keeps showing the old
    // channels (no fader for new tracks, stale names for
    // re-numbered ones). Rebuilding is cheap (the mixer panel
    // is small) and consistent with the track list rebuild.
    renderMixerTracks();
    STATE._lastRenderedTrackCount = _curCount;
    STATE._lastRenderedAudioFrames = _curAudio.slice();
    STATE._lastRenderedClipBlocks = _curBlocks.map(function(arr) { return arr.slice(); });
    _forceFullRebuild = false;  // one-shot
  }

  refreshPeaks();

  if (STATE.sel !== -1 && STATE.sel >= STATE.trackCount)
    STATE.sel = Math.max(-1, STATE.trackCount - 1);

  // Update names, M/S/A button states, and drop-hints
  for (var i = 0; i < STATE.trackCount; i++) {
    var tn = document.getElementById('tn-' + i);
    if (tn) tn.textContent = (STATE.names[i] || 'Track ' + (i+1)).substring(0, 14);
    var cn = document.getElementById('cn-' + i);
    if (cn) cn.textContent = (STATE.names[i] || ('Track ' + (i+1))).substring(0, 8);
    var dh = document.getElementById('dh-' + i);
    if (dh) dh.style.display = STATE.audioFrames[i] > 0 ? 'none' : '';
    // Track header M/S/A
    var tbm = document.getElementById('tbm-' + i);
    if (tbm) tbm.className = 'tb' + (STATE.mutes[i] ? ' on-m' : '');
    var tbs = document.getElementById('tbs-' + i);
    if (tbs) tbs.className = 'tb' + (STATE.solos[i] ? ' on-s' : '');
    var tba = document.getElementById('tba-' + i);
    if (tba) tba.className = 'tb' + (STATE.arms[i] ? ' on-a' : '');
    // Mixer M/S/A
    var mbm = document.getElementById('mbm-' + i);
    if (mbm) mbm.className = STATE.mutes[i] ? ' on-m' : '';
    var mbs = document.getElementById('mbs-' + i);
    if (mbs) mbs.className = STATE.solos[i] ? ' on-s' : '';
    var mba = document.getElementById('mba-' + i);
    if (mba) mba.className = STATE.arms[i] ? ' on-a' : '';
  }

  updateTransport();
  updateTransportBpm();
  updateTime();
  updateBarDisplay();
  updateMixer();
  updateMaster();
  updateFxPanel();
  updateMixerSelection();
  autoScrollTimeline();
  updateScrollbar();
  drawRuler();
  if (_needsWaveformRedraw) drawAllWaveforms();

  // BUGFIX: Render tracks + mixer on first telemetry push
  if (!STATE.tracksRendered) {
    log('INFO', 'LOOP', 'First telemetry received — rendering tracks & mixer');
    renderTrackList();

//
// We set _forceFullRebuild = true so that the NEXT updateUIFromNative
// — regardless of whether it arrives as a full or partial update,
// regardless of timing — triggers a complete track list rebuild and
// re-fetches all peak caches. This is the load-fix belt-and-braces:
// even if the C++ side somehow sends a partial update first (e.g.
// because the UI thread raced with the load dispatch), we still
// rebuild from scratch.
//
// The flag is one-shot: the rebuild consumes it (sets it back to
// false), so it only affects the single update immediately after
// the load.

function addTrack() {
  var p = cn('nativeAddTrack');
  if (p && typeof p.then === 'function') {
    p.then(function(n) {
      if (typeof n === 'number' && n >= 0) {
        log('INFO', 'TRACK', 'Added track ' + n);

        STATE.peakCaches[n] = [];
        STATE.audioFrames[n] = 0;
        STATE.clipStarts[n] = 0;
        _clipNames[n] = '';

function removeTrack() {
  var tc = STATE.trackCount;
  if (tc <= 1) {
    log('WARN', 'TRACK', 'Cannot remove last track');
    showError('Cannot remove the last track');
    return;
  }
  var idx = STATE.sel;
  log('INFO', 'TRACK', 'Removing track ' + idx);

  if (STATE.peakCaches) STATE.peakCaches.splice(idx, 1);
  if (_clipNames) _clipNames.splice(idx, 1);
  if (STATE.audioFrames) STATE.audioFrames.splice(idx, 1);
  if (STATE.clipStarts) STATE.clipStarts.splice(idx, 1);
  if (STATE.volumes) STATE.volumes.splice(idx, 1);
  if (STATE.mutes) STATE.mutes.splice(idx, 1);
  if (STATE.solos) STATE.solos.splice(idx, 1);
  if (STATE.arms) STATE.arms.splice(idx, 1);
  if (STATE.names) STATE.names.splice(idx, 1);
  if (STATE.peaks) STATE.peaks.splice(idx, 1);

  cn('nativeRemoveTrack', String(idx));
  STATE.trackCount--;
  if (STATE.sel >= STATE.trackCount) STATE.sel = STATE.trackCount - 1;

  _needsWaveformRedraw = true;
  renderAll();
}

function doMute(i) {
  STATE.mutes[i] = !STATE.mutes[i];
  log('INFO', 'TRACK', 'Mute track ' + i + ' -> ' + (STATE.mutes[i] ? '1' : '0'));
  cn('nativeSetMute', i + ',' + (STATE.mutes[i] ? '1' : '0'));
}
var _savedMutes = null;
function doSolo(i) {
  if (STATE.solos[i]) {
    // Solo being deactivated — restore saved mutes
    STATE.solos[i] = false;
    if (_savedMutes) {
      for (var j = 0; j < STATE.trackCount; j++) {
        if (STATE.mutes[j] !== _savedMutes[j]) {
          STATE.mutes[j] = _savedMutes[j];
          cn('nativeSetMute', j + ',' + (_savedMutes[j] ? '1' : '0'));
        }
      }
      _savedMutes = null;
    }
  } else {
    // Solo activated — remove solo from any other track
    for (var j = 0; j < STATE.trackCount; j++) {
      if (j !== i && STATE.solos[j]) {
        STATE.solos[j] = false;
        cn('nativeSetSolo', j + ',' + '0');
      }
    }
    STATE.solos[i] = true;
    _savedMutes = STATE.mutes.slice();
    // Mute all except this track, unmute this one
    for (var j = 0; j < STATE.trackCount; j++) {
      var newMute = (j !== i);
      if (STATE.mutes[j] !== newMute) {
        STATE.mutes[j] = newMute;
        cn('nativeSetMute', j + ',' + (newMute ? '1' : '0'));
      }
    }
  }

  cn('nativeSetSolo', i + ',' + (STATE.solos[i] ? '1' : '0'));
  log('INFO', 'TRACK', 'Solo track ' + i + ' -> ' + (STATE.solos[i] ? '1' : '0'));
}
function doArm(i) {
  STATE.arms[i] = !STATE.arms[i];
  log('INFO', 'TRACK', 'Arm track ' + i + ' -> ' + (STATE.arms[i] ? '1' : '0'));
  cn('nativeSetArm', i + ',' + (STATE.arms[i] ? '1' : '0'));
}

function escHtml(s) {

function drawRuler() {
  var c = document.getElementById('ruler-cv');
  var p = document.getElementById('ruler');
  if (!c || !p) return;
  if (!_needsRulerRedraw && _lastRulerPlayhead === STATE.playhead && _lastRulerScrollX === _tlScrollX) return;
  _lastRulerPlayhead = STATE.playhead;
  _lastRulerScrollX = _tlScrollX;
  _needsRulerRedraw = false;
  var w = p.clientWidth || 800;
  c.width = w; c.height = 22;
  var ctx = c.getContext('2d');
    ctx.fillStyle = cssVar('--bg'); ctx.fillRect(0, 0, w, 24);
    ctx.strokeStyle = cssVar('--bd'); ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, 23.5); ctx.lineTo(w, 23.5); ctx.stroke();
  var pxPerSec = 80;
  var rulerOff = 140;
  var scrollOff = _tlScrollX || 0;
  var sr = STATE.sampleRate || 48000;
  var bpm = STATE.bpm || 120;
  var num = STATE.timeSigNum || 4;
  var den = STATE.timeSigDen || 4;
  // Samples per beat (quarter note). Adjust for denominator:
  // 4 = quarter, 8 = eighth, etc.
  var samplesPerBeat = sr * 60 / bpm * (4 / den);
  var beatsPerBar = num;
  var samplesPerBar = samplesPerBeat * beatsPerBar;
  var pxPerBeat = (samplesPerBeat / sr) * pxPerSec;
  // Find first visible bar/beat
  var firstBarIdx = Math.floor((scrollOff / pxPerSec * sr) / samplesPerBar);
  var lastBarIdx = Math.ceil(((w + scrollOff) / pxPerSec * sr) / samplesPerBar) + 1;
  for (var b = firstBarIdx; b <= lastBarIdx; b++) {
    var barSample = b * samplesPerBar;
    var barX = rulerOff + (barSample / sr) * pxPerSec - scrollOff;
    if (barX < rulerOff - 60 || barX > w + 60) continue;
    // Bar line (heavier)
    ctx.strokeStyle = cssVar('--bd2'); ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(barX, 8); ctx.lineTo(barX, 24); ctx.stroke();
    ctx.fillStyle = cssVar('--txt3'); ctx.font = '9px -apple-system,BlinkMacSystemFont,sans-serif';
    ctx.fillText((b + 1) + '', barX + 3, 9);
    // Sub-beat lines
    for (var bi = 1; bi < beatsPerBar; bi++) {
      var beatSample = barSample + bi * samplesPerBeat;
      var beatX = rulerOff + (beatSample / sr) * pxPerSec - scrollOff;
      if (beatX < rulerOff - 10 || beatX > w + 10) continue;
      ctx.strokeStyle = cssVar('--bd'); ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(beatX, 16); ctx.lineTo(beatX, 24); ctx.stroke();
    }

  if (phx >= rulerOff && phx <= c.width) {
    ctx.strokeStyle = cssVar('--yellow'); ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(phx, 0); ctx.lineTo(phx, 24); ctx.stroke();
    ctx.fillStyle = cssVar('--yellow'); ctx.beginPath(); ctx.moveTo(phx, 0); ctx.lineTo(phx - 4, 9); ctx.lineTo(phx + 4, 9); ctx.fill();
  }
}

document.getElementById('ruler').addEventListener('click', function(e) {

    }

// ── TIMELINE SCROLL ──
function getTotalTimelineWidth() {
  if (!_timelineWidthDirty) return _cachedTimelineWidth;
  var pxPerSec = 80;
  var sr = 48000;
  var maxEnd = 0;
  for (var i = 0; i < STATE.trackCount; i++) {
    var end = ((STATE.clipStarts[i] || 0) + STATE.audioFrames[i]) / sr * pxPerSec + 140;
    if (end > maxEnd) maxEnd = end;
  }
  var c = document.getElementById('ruler-cv');
  var viewW = c ? c.width : 800;
  _cachedTimelineWidth = Math.max(viewW + 1, maxEnd + 160);
  _timelineWidthDirty = false;
  return _cachedTimelineWidth;
}

function updateScrollbar() {
  var range = document.getElementById('tl-scroll-range');
  if (!range) return;
  var totalW = getTotalTimelineWidth();
  var c = document.getElementById('ruler-cv');
  var viewW = c ? c.width : 800;
  var maxScroll = Math.max(0, totalW - viewW);
  range.max = maxScroll || 1;
  range.value = Math.min(_tlScrollX, maxScroll);
}

function applyTimelineScroll() {
  var totalW = getTotalTimelineWidth();
  var c = document.getElementById('ruler-cv');
  var viewW = c ? c.width : 800;
  var maxScroll = Math.max(0, totalW - viewW);
  if (_tlScrollX > maxScroll) _tlScrollX = maxScroll;
  var els = document.querySelectorAll('.clip-scroll');
  for (var i = 0; i < els.length; i++) {
    els[i].style.transform = 'translateX(-' + _tlScrollX + 'px)';
  }
  _needsRulerRedraw = true;
  updateScrollbar();
  drawRuler();
}

  // Apply the tool class to #track-list so the CSS rule (with
  // !important) overrides the per-element cursor:grab on each
  // .clip-block. This is the only reliable way to change the
  // cursor across the timeline area without fighting specificity.
  var list = document.getElementById('track-list');
  if (list) {
    list.classList.remove('tool-pointer', 'tool-split', 'tool-fade');
    list.classList.add('tool-' + t);
  }
  log('INFO', 'TOOL', 'tool=' + t);
}

var _fadeDrag = null;

function autoScrollTimeline() {
  if (_dragInProgress) return;
  var c = document.getElementById('ruler-cv');
  if (!c) return;
  var pxPerSec = 80;
  var rulerOff = 140;
  var phAbs = rulerOff + (STATE.playhead / 48000) * pxPerSec;
  var viewW = c.width - rulerOff;
  if (viewW <= 0) return;

  if (!STATE.playing) {
    _playheadTargetFraction = -1;
    return;
  }

  if (_scrollMode === 'continuous') {
    // Capture anchor fraction when play starts (or recapture on play)
    if (_playheadTargetFraction < 0) {
      _playheadTargetFraction = (phAbs - _tlScrollX - rulerOff) / viewW;
      _playheadTargetFraction = Math.max(0, Math.min(1, _playheadTargetFraction));
    }
    var targetScroll = Math.max(0, phAbs - rulerOff - viewW * _playheadTargetFraction);
    var totalW = getTotalTimelineWidth();
    var maxScroll = Math.max(0, totalW - c.width);
    targetScroll = Math.min(targetScroll, maxScroll);
    if (Math.abs(targetScroll - _tlScrollX) > 2) {
      _tlScrollX = targetScroll;
      applyTimelineScroll();
    }
  } else {
    // Page mode: playhead travels across the screen; when it reaches the
    // right edge the viewport jumps one full page and the playhead returns
    // to the left edge.
    var phVisible = phAbs - _tlScrollX;
    var pageMargin = 80; // 1 second before right edge
    var totalW = getTotalTimelineWidth();
    var maxScroll = Math.max(0, totalW - c.width);
    if (phVisible > rulerOff + viewW - pageMargin && _tlScrollX < maxScroll) {
      // Jump so the playhead lands exactly at rulerOff (left edge of content).
      // The amount = distance from playhead to left edge = phVisible − rulerOff.
      _tlScrollX = Math.min(_tlScrollX + (phVisible - rulerOff), maxScroll);
      applyTimelineScroll();
    }
  }
}

// Scrollbar input listener
(function() {
  var range = document.getElementById('tl-scroll-range');
  if (!range) return;
  range.addEventListener('input', function() {
    _tlScrollX = parseFloat(this.value) || 0;
    applyTimelineScroll();
  });
})();

function refreshPeaks() {
  for (var i = 0; i < STATE.trackCount; i++) {
    if (STATE.audioFrames[i] > 0 && (!STATE.peakCaches[i] || !STATE.peakCaches[i].length)) {
      (function(idx) {
        cn('nativeGetPeakCache', String(idx)).then(function(peaks) {
          STATE.peakCaches[idx] = peaks || [];
          _needsWaveformRedraw = true;
          drawAllWaveforms();
        });
      })(i);
    }
  }
}

function drawAllWaveforms() {
  if (!_needsWaveformRedraw) return;
  _needsWaveformRedraw = false;
  // Iterate over every clip-block in the DOM (not just trackCount
  // single primary clips) so split clips are all drawn.
  var blocks = document.querySelectorAll('.clip-block');
  for (var bi = 0; bi < blocks.length; ++bi) {
    var block = blocks[bi];
    var canvas = block.querySelector('canvas.wf');
    if (!canvas) continue;
    var w = block.clientWidth, h = block.clientHeight;
    if (w < 4 || h < 4) continue;
    var trackId = parseInt(block.getAttribute('data-track'), 10);
    var clipId = parseInt(block.getAttribute('data-clip') || '0', 10);
    // All clips (primary and extras) now receive their peak cache
    // synchronously via the telemetry clipPeakCaches payload. The
    // legacy STATE.peakCaches async path remains as a fallback.
    var pc = null;
    var cpc = STATE.clipPeakCaches[trackId];
    if (cpc && cpc[clipId] && cpc[clipId].length) {
      pc = cpc[clipId];
    } else if (clipId === 0 && STATE.peakCaches[trackId] && STATE.peakCaches[trackId].length) {
      pc = STATE.peakCaches[trackId];
    }
    canvas.width = w; canvas.height = h;
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, w, h);
    if (!pc || !pc.length) {
      ctx.strokeStyle = 'rgba(148,163,184,0.25)'; ctx.lineWidth = 1;
      var mid = h / 2;
      ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(w, mid); ctx.stroke();
      continue;
    }
    // Density-based bar count: 1 bar every ~2 pixels of clip width
    // Use the peak cache size directly as the bar count. C++ now
    // generates 1 peak per 256 frames of audio (5.3ms @ 48kHz), so
    // every bar corresponds to exactly 1 cache sample — no resampling,
    // no pixel-based target, no max-pool or interpolation. A 5s clip
    // has ~937 bars, a 0.5s clip has ~93 bars, both at the same
    // temporal density (187 bars/second of audio). The canvas width
    // only determines where bars are placed, not how many there are.
    var targetBars = pc.length;
    var mid2 = h / 2, amp = h * 0.4;
    ctx.strokeStyle = 'rgba(148,163,184,0.5)'; ctx.lineWidth = 1;
    for (var b = 0; b < targetBars; b++) {
      // Direct 1:1 — bar index b reads cache sample b
      var mx = pc[b] || 0;
      mx = Math.min(mx * amp, amp);
      var bx = (b + 0.5) * w / targetBars;
      ctx.beginPath(); ctx.moveTo(bx, mid2 - mx); ctx.lineTo(bx, mid2 + mx); ctx.stroke();
    }
  }
}

// ── BROWSER ──
function loadBrowser(path) {
  log('INFO', 'BROWSER', 'Loading directory: ' + path);
  var errEl = document.getElementById('browser-error');
  if (errEl) errEl.style.display = 'none';
  STATE.browserPath = path;
  var pathEl = document.getElementById('browser-path');
  if (pathEl) pathEl.textContent = path.length > 50 ? '...' + path.slice(-47) : path;
  var list = document.getElementById('browser-list');
  if (!list) { log('ERROR', 'BROWSER', 'browser-list element not found'); return; }
  list.innerHTML = '<div style="color:#64748B;padding:8px;font-size:11px">Loading...</div>';

  var p = cn('nativeListDir', path);
  if (p && typeof p.then === 'function') {
    p.then(function(entries) {
      if (!entries || !Array.isArray(entries)) {
        log('WARN', 'BROWSER', 'nativeListDir returned: ' + JSON.stringify(entries));
        list.innerHTML = '<div style="color:#ef4444;padding:8px;font-size:11px">Error loading directory</div>';
        return;
      }
      var html = '<div class="item dir" onclick="parentDir()">..</div>';
      entries.sort(function(a, b) {
        if (a.dir && !b.dir) return -1;
        if (!a.dir && b.dir) return 1;
        return (a.name || '').localeCompare(b.name || '');
      });
      for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        if (!e || typeof e.name !== 'string') continue;
        if (!e.dir) {
          var isAudio = e.ext === '.wav' || e.ext === '.mp3' || e.ext === '.flac' || e.ext === '.ogg' || e.ext === '.aac' || e.ext === '.m4a' || e.ext === '.wma' || e.ext === '.opus' || e.ext === '.aiff' || e.ext === '.aif';
          if (!isAudio) continue;
        }
        var cls = 'item' + (e.dir ? ' dir' : ' audio');
        html += '<div class="' + cls + '" style="padding:5px 8px;cursor:pointer" ' +
          (e.dir ? 'ondblclick="loadBrowser(\'' + escPath(path) + '/' + escPath(e.name) + '\')"' :
           'ondblclick="loadAudio(\'' + escPath(path) + '/' + escPath(e.name) + '\')"') +
          '>' + escHtml(e.dir ? e.name + '/' : e.name) + '</div>';
      }
      list.innerHTML = html;
      log('INFO', 'BROWSER', 'Loaded ' + entries.length + ' entries from ' + path + '; first item: ' + (entries.length>0 ? (entries[0].dir?'DIR:':'FILE:') + entries[0].name : 'none'));
      // Verify DOM was actually set
      setTimeout(function() {
        var items = list.querySelectorAll('.item');
        log('DEBUG','BROWSER','DOM check: ' + items.length + ' items rendered, first text: ' + (items.length>0 ? items[0].textContent.trim() : '(none)'));
      }, 50);
    });
  } else {
    list.innerHTML = '<div style="color:#ef4444;padding:8px;font-size:11px">Native bridge not ready</div>';
  }
}

function escPath(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

function parentDir() {
  var p = STATE.browserPath;
  var idx = p.lastIndexOf('/');
  if (idx > 0) { loadBrowser(p.substring(0, idx)); }
  // at root, stay
}

function loadAudio(filePath) {
  log('INFO', 'BROWSER', 'Loading audio: ' + filePath);
  markDropProcessed(filePath); // prevent decide-policy from loading again

  function doLoad(trackId) {
    var p = cn('nativeLoadWav', trackId + ',' + filePath);
    if (p && typeof p.then === 'function') {
      p.then(function(ok) {
        if (ok === true) {
          log('INFO', 'BROWSER', 'Audio loaded OK on track ' + trackId);
          STATE.sel = trackId;
          // Extract filename for clip label (separate from track name)
          var parts = filePath.split('/');
          _clipNames[trackId] = parts[parts.length - 1] || 'Audio';
          cn('nativeGetAudioInfo', String(trackId)).then(function(info) {
            if (info && info.hasAudio) {
              STATE.audioFrames[trackId] = info.frames;
              STATE.clipStarts[trackId] = info.clipStart;
            }
            cn('nativeGetPeakCache', String(trackId)).then(function(peaks) {
              STATE.peakCaches[trackId] = peaks || [];
              renderAll();
            });
          });
        } else {
          log('WARN', 'BROWSER', 'Failed to load audio: ' + filePath);
          showError('Could not load ' + filePath.split('/').pop());
        }
      });
    }
  }

  var sel = STATE.sel;
  // If selected track is empty, use it
  if (sel >= 0 && sel < STATE.trackCount && !(STATE.audioFrames[sel] > 0)) {
    doLoad(sel);
    return;
  }
  // Find first empty track
  for (var i = 0; i < STATE.trackCount; i++) {
    if (!(STATE.audioFrames[i] > 0)) {
      STATE.sel = i;
      doLoad(i);
      return;
    }
  }
  // All tracks full — add one
  var p = cn('nativeAddTrack');
  if (p && typeof p.then === 'function') {
    p.then(function(n) {
      if (typeof n === 'number' && n >= 0) {
        STATE.trackCount++;
        STATE.sel = n;
        doLoad(n);
      } else {
        showError('Could not add track');
      }
    });
  }
}

function initBrowser() {
  log('INFO', 'BROWSER', 'initBrowser: getting CWD...');
  var p = cn('nativeGetCwd');
  if (p && typeof p.then === 'function') {
    p.then(function(cwd) {
      log('INFO', 'BROWSER', 'CWD = ' + JSON.stringify(cwd) + ' (type=' + typeof cwd + ')');
      if (typeof cwd === 'string' && cwd) {
        loadBrowser(cwd);
      } else {
        log('WARN', 'BROWSER', 'nativeGetCwd returned invalid value, trying /home');
        loadBrowser('/home');
      }
    });
  } else {
    log('WARN', 'BROWSER', 'nativeGetCwd not available, trying /home');
    loadBrowser('/home');
  }
}

var _rafPending = false;
function scheduleMeterUpdate() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(function() {
    _rafPending = false;
    var tc = STATE.trackCount;
    for (var i = 0; i < tc; i++) {
      var mf = document.getElementById('mf-' + i);
      if (mf) {
        var pct = Math.min(((STATE.peaks[i] || 0) / 1.5), 1.0);
        mf.style.transform = 'scaleY(' + pct.toFixed(3) + ')';
      }
      var db = document.getElementById('db-' + i);
      if (db) {
        var v = STATE.volumes[i] || 1;
        var dB = v > 0.0001 ? 20 * Math.log10(v) : -Infinity;
        db.textContent = !isFinite(dB) ? '-inf dB' : (dB >= 0 ? '+' : '') + dB.toFixed(1) + ' dB';
      }
      var fd = document.getElementById('fd-' + i);
      if (fd && document.activeElement !== fd) fd.value = STATE.volumes[i] || 1;
    }
  });
}
function updateMixer() { scheduleMeterUpdate(); }
